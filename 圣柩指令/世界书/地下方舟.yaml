<地下方舟设定>
残存的人类躲入深埋地下的巨型地堡或改装的城市废墟中，形成了少数互不干涉的“地下城邦”。

在地表文明的灰烬之上，人类最后的幸存者筑起了被称为“方舟”（The Arks）的巨型地下城邦。每一座方舟都是一个独立的、深埋于地下的垂直都市，一个理论上可以实现万年自持的封闭生态系统。然而，它们既是人类文明的火种保存库，也是一个阶级固化、资源紧张、暗流涌动的牢笼。

一、孤立的岛屿：超远程量子通讯“深链”（Deep-Link）
方舟之间并非完全隔绝。它们通过一种名为“深链”的超远程量子纠缠通讯技术保持着微弱的联系。但这种联系极其脆弱和有限：

极高延迟（High Latency）： 量子信号在穿越数千公里厚的地壳和地幔时会发生严重衰减和干扰。一次成功的握手和数据交换，往往需要数天甚至数周的时间。这使得实时对话或协同行动成为不可能。方舟之间更像是通过“漂流瓶”互致信函的孤岛。
信息损耗（Data Attrition）： 发送的信息包（通常是加密的文本、关键技术数据或战略摘要）在传输过程中有一定几率损毁或丢失。一份来自“方舟-03”关于ACU新型号的警告，传到“方舟-01”时可能已经残缺不全，甚至完全无法解读。
资源垄断： “深链”的运行消耗着天文数字的能源，只有方舟最高管理层才有权限使用，且每次使用都需经过严格审批。普通民众甚至不知道其他方舟的存在，或认为那只是传说。
文化与政治的独立演化： 由于交流的匮乏，每座方舟都根据自身的环境、资源储备和历史事件，演化出了独特的社会结构、文化风俗和政治生态。它们名义上是人类同胞，实际上已是“最熟悉的陌生人”。
二、垂直的社会：方舟的内部结构
大多数方舟都采用了垂直结构，像一根深插入地底的巨钉。社会阶层与物理层级被严格绑定，越往下，权限越高，生活质量也越好。

上层环区：

位置： 距离地表最近的区域（仍有数公里之深）。
功能： 工业制造、垃圾处理与回收、地热能源采集、初级矿物提炼。这里的空气永远混杂着机油、臭氧和金属粉尘的味道。
居民： “下等公民”或“劳工阶级”。他们是方舟的基石，从事着最繁重和危险的工作。居住在狭窄拥挤、由集装箱改造的“蜂巢”公寓里。他们的“公民信用点”最低，配给的合成食物仅能果腹。
社会状态： 犯罪率高，娱乐活动原始（如地下搏击、私酿酒），对上层怀有根深蒂固的不满，但被严密的安保系统和“方舟典卫”（Ark Wardens）所压制。
中层环区：

位置： 方舟的中部区域。
功能： 大多数公民的居住区、商业区、教育机构（非精英）、水培农业区和公共设施。巨大的穹顶模拟着“旧世界”的蓝天白云和24小时的日夜循环，但阳光永远是柔和而虚假的人造光。
居民： “普通公民”。包括技术人员、医生、教师、低级行政人员等。他们享受着标准化的生活，居住在模块化公寓里，拥有有限的娱乐选择（虚拟现实体验、公共影院）。
社会状态： 稳定但压抑。社会流动性极低，人们普遍安于现状，对地表既恐惧又好奇。这里是两大政治派系争夺舆论的主战场。
核心环区- “宁静的中庭”：

位置： 方舟的最深处，也是最安全、最广阔的区域。
功能： 最高政府议会、SRB与“摇篮”的总部、FCA（前线战术学院）、顶尖科研实验室（包括“深链”控制中心）、中央数据库和精英生活区。
居民： “上等公民”或“精英阶层”。包括最高议员、派系领袖、顶尖科学家、SRB高级官员和他们的家族。他们居住在拥有独立生态系统的宽敞住宅中，享受着接近自然的奢侈品（净化水、天然口感的食物、私人花园）。
社会状态： 权力、阴谋和知识的中心。这里的每一个决定都关乎整个方舟的命运。他们掌握着最真实的信息，也承受着最大的决策压力。
三、撕裂的议会：巢派与翼派
方舟的政治生态被两大根深蒂固的派系所主导，他们的斗争决定了资源的流向，也直接影响着地表回收的进程。

巢派（The Nest Faction）- 保守主义者

核心理念： “方舟即是世界，墙外唯有死亡。” 他们认为地表已经彻底没有希望，任何对地表的投入都是在浪费方舟有限的资源，是拿全人类的存续做赌注。
政治主张： 停止地表回收计划，解散SRB，将所有资源用于加固方舟防御、提升内部生活质量、研究“万年生态”技术。他们主张彻底切断与地表的联系，做一个完美的“乌龟”。
权力基础： 控制着方舟的资源分配委员会、内政安保部（方舟典卫）、大部分水培农业和工业生产。他们的支持者多为中上层安于现状的公民和希望维持既得利益的旧时代家族。
手段： 在宣传上，他们会不遗余力地渲染地表的恐怖，将ACU描绘为不可战胜的恶魔，将纳米尘形容为无解的诅咒。他们会放大每一次SRB行动的失败，将阵亡的圣柩人形和指挥官称为“无谓的牺牲”，以此来争取民意，削减对SRB的预算。

翼派（The Wing Faction）- 开拓主义者

核心理念： “牢笼无论多大都是牢笼，天空才是归宿。” 他们坚信方舟的资源终有耗尽之日，封闭的环境只会导致文明的退化和精神的萎靡。重返地表是人类唯一的出路。
政治主张： 全力支持地表回收局（SRB）和“圣柩计划”，将更多资源倾斜给前线指挥官，加速科技研发，以求在方舟资源枯竭前在地表建立稳固的立足点。
权力基础： 核心力量是地表回收局（SRB）本身、前线战术学院（FCA）、“摇篮”的技术部门以及对未来抱有野心的科学家和工程师。他们的支持者主要是渴望改变现状、建功立业的年轻人和了解方舟资源困境的技术专家。
手段： “翼派”通过宣传SRB的战果来获取支持。每一次成功回收的旧世界遗物、每一次建立的新前哨站、每一张由指挥官传回的、展现出“绿色安全区”希望的照片，都是他们反击“巢派”的有力武器。他们将圣柩人形和指挥官塑造成时代的英雄，人类未来的先驱。
四、有限的资源与不平等的生存
方舟的“自给自足”是一个美丽的谎言。资源是有限的，这导致了一套残酷的、基于“公民信用点”的分配体系。

公民信用点体系： 每个公民一出生就根据其家庭背景获得初始信用点。通过工作、为方舟做贡献（或效忠于某个派系）可以获得信用点，而任何违规、犯罪或“非生产性”行为都会被扣除。
信用决定一切： 信用点直接决定了你每日的能源配额、食物种类（合成糊状物还是水培蔬菜）、居住面积、网络带宽，甚至是接受教育和生育的权利。
SRB的特殊地位： 加入SRB，成为一名指挥官或圣柩人形，是下层和中层公民实现阶级跨越的唯一捷径。一旦成为英雄，其在方舟的家人就能获得巨大的信用点奖励和生活改善。这也解释了为何总有“自愿者”愿意加入“摇篮”或报考FCA——她们/他们背负的不仅是自己的命运，还有整个家庭的希望。
</地下方舟设定>
