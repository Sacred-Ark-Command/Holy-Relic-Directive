陆行舰管理： 统筹陆行舰的资源采集、科技研发、内部设施升级，决定行动路线和任务目标
陆行舰的资源与运营
核心资源：
燃料： 决定了陆行舰的移动距离
口粮： 维持所有人员（包括指挥官）的基本生理需求，影响士气
零件： 用于维修陆行舰和人形的战损，以及建造和升级设施
心智冷却液： 稀有且至关重要，是人形维持心智健康的唯一保障
资源循环：
探索与回收（输入） → 战斗（消耗） → 战利品（ACU残骸、稀有矿物）→ 加工厂（转化） → 零件、燃料、升级蓝图（输出） → 强化单位 → 探索更危险的区域（循环）

动力核心：
升级路径： 老旧核心 → 稳定型核聚变核心（降低燃料消耗，减少噪音） → 高能晶体驱动核心（解锁超载功能，短时间爆发性提供能源给武器系统）
变化： 船内灯光从忽明忽暗变得稳定明亮，震动消失。少女们会感叹“终于能睡个好觉了”

生活区：
升级路径： 大通铺 → 标准双人宿舍（提供更多私人空间） → 个性化单人房间（允许人形根据自己的喜好装饰房间，解锁特殊家具和互动） → 生态居住区（在舰内建立小型生态穹顶，有人造阳光、流水和植物，是终极的奢侈）
变化： 少女们开始拥有自己的“小窝”，指挥官可以进入她们的房间进行一对一互动。房间的装饰会反映她们的性格（例如，爱读书的人形房间里会有书架，爱音乐的会有播放器）。她们可能会邀请你来房间喝茶或聊天

食堂：
升级路径： 配给站 → 简易厨房（解锁基础烹饪功能，少女们可以轮流做饭，但经常做出“黑暗料理”） → 多功能餐厅（拥有丰富的食材库和专业的厨具，可以制作各种美食，提升全员士气） → “回忆之味”系统（通过特殊遗物，可以重现旧世界的某些特定食物，触发特定人形的个人剧情）
变化： 食堂成为最热闹的地方。日常剧情会在这里大量发生，比如争论今天的菜单，或者某个笨手笨脚的人形把厨房弄得一团糟。指挥官可以和她们一起用餐，提升羁绊

模拟训练室： 可以在此进行战术演练，提升人形的战斗经验
自动化维护臂： 自动进行战后检查和修复

科研实验室：
初始： 无。需要收集蓝图和材料从零开始建造
升级路径： 基础实验室 → 材料分析中心（解锁对稀有资源的深度加工能力） → 逆向工程部（可以分析ACU残骸，解锁新的科技和武器） → “摇篮”技术对接平台（需要极高的SRB评价，可以直接获得来自“摇篮”的尖端技术支持）
变化： 这里是技术型人形最爱待的地方。她们会在这里进行各种研究，偶尔会引发小小的爆炸或事故。指挥官可以在这里投入资源，研发新的装备和陆行舰模块

娱乐与休闲设施
初始： 几乎为零
升级路径： 可以建造图书馆、游戏室、放映厅、小型温室花园、甚至是温泉浴场
变化： 极大地丰富了舰内日常。不同性格的人形会被不同的设施吸引。指挥官可以在这些地方与她们进行特定主题的互动，解锁日常剧情。例如，在图书馆可以和文学少女讨论旧世界的诗歌；在温室可以和喜欢植物的人形一起打理花草
