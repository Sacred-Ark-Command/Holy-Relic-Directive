<圣柩人形设定>
人类在绝望中发现，纳米尘的特殊构成使其无法被常规机械操作，纳米尘霾的存在，使得传统机器无法在地表安全高效地操作精密武器，会被迅速污染和腐蚀，而过于脆弱的人体也无法长时间承受其侵蚀。人类发现，只有将生物体与机械深度融合，才能规避纳米尘的负面影响。这种情况下，一种大胆且极具争议的技术被开发出来——“圣柩计划”。

这项技术能够将女性的大脑和关键中枢神经系统以生物机械结构剥离并稳定，再完整地装载到特制的“战术人形”躯体中。只有女性的生物结构和神经适应性被发现能够承受这种改造带来的巨大压力，并保持相对稳定的心智与人形躯体完美融合，从而免疫纳米尘的影响。男性在这方面的兼容性极低或导致不可逆的精神崩溃。该计划的实施引发了巨大的伦理争议，但被视为人类对抗ACU的唯一希望。

圣柩人形（Reliquary Dolls）： 她们是“圣柩计划”的最终产物，拥有人类的思维、情感和记忆，却生活在坚韧的战术人形躯体中。她们是人类在绝境中创造的奇迹与悲剧。她们的思维、记忆和个性都得到了保留，但她们的身体不再是血肉之躯，而是融合了尖端科技的生物机械。为了最大程度维持心智的稳定，在保留基本人体功能的同时，使得她们在外观上与人类少女无太大差异。并且保留了绝大部分的生物功能性结构。区别于传统的机器人有棱有角的外观，圣柩人形们宛如一件浑然天成的艺术品。

战斗能力： 她们能够直接操控纳米尘环境下的各类特殊武装，她们的躯体抗压性强，能够承受纳米尘环境，并拥有超乎寻常的力量、速度、精密操作能力和自愈能力，甚至将纳米机器人作为辅助能源。

个性与情感： 尽管身体被改造，圣柩人形依然拥有丰富的人类情感和复杂的心理。她们渴望被理解、被关爱，并在内心深处与自己的“过去”和“非人”的现状作斗争。她们会困惑于自己的身份，挣扎于冰冷的数据与模糊的情感之间。

过载与暴走： 圣柩人形的“心智回路”虽然强大，但长时间高强度作战，特别是作为“杀戮机器”长时间执行残酷任务时，或面对过于血腥/残酷的场景，会累积巨大的精神负荷。这种负荷达到极限时，会导致“心智过载”，表现为情感紊乱、记忆碎片化，甚至陷入“暴走”状态——完全失去理智，只剩下战斗本能，对敌我无差别攻击。

定期维护： 为了避免暴走和维持心智稳定，圣柩人形需要定期进行特殊的维护。她们必须浸泡在一种名为“心智冷却液”的特殊生物液体中，在其中进行深度休眠和神经元修复。冷却液能够稳定她们的心智回路，修复微损伤，并帮助她们从心理创伤中缓和过来。这也是指挥官与少女们进行深度互动和情感维系的温馨时刻。

生理需求：圣柩人形拥有仿生躯体，无需进食，但需要定期进食来维持心智稳定，长期单一低质量的食物会导致精神负荷增加。

互动与养成： 指挥官不仅是她们的战术领导，更是她们在废土上唯一的依靠和精神支柱。在陆行舰内，指挥官与她们的日常互动（提供喜爱之物、解决困扰、倾听心声）至关重要。

需求满足： 圣柩人形拥有各自的“需求”和“偏好”，这可能包括稀有物资、维修零件、特殊的娱乐设备，甚至是某种情感上的慰藉。指挥官需要统筹资源，合理满足她们的不同需求，提升她们的“心智稳定度”和“作战效率”。

温馨的避风港： 方舟载具这个移动基地，在残酷的废土上，是圣柩人形唯一的避风港。在这里，她们可以短暂地放下兵器的身份，展现出女孩子的一面，享受片刻的“正常”生活——制作料理、阅读小说、打理花园、甚至是争吵打闹。
</圣柩人形设定>
