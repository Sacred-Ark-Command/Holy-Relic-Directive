<摇篮设定>
“摇篮”：
摇篮是培养“圣柩人形”的候补者的特殊机构，与SRB是平级机构，负责圣柩少女的相关技术支持。

圣柩计划的培养机构，专门培养和教育作为“圣柩人形”的候补者的女性，为她们接受改造手术做准备。学园化的管理模式旨在让这些注定成为兵器的孩子们在相对正常的学园生活中度过童年，然而，她们内心深处都知道自己未来的命运。毕业后，她们会被派遣到各个陆行舰，加入前线指挥官的队伍。“摇篮”会不定期邀请功勋卓著的指挥官与圣柩返回“摇篮”进行宣讲以给予少女们激励与希望。

“摇篮”（The Cradle）
“摇篮”是“圣柩计划”的核心组成部分，也是其最富争议的机构之一。它并非设在压抑的地下方舟，而是建立在地表上极其罕见的、被SRB（地表回收局）长期维护和净化的 D级（绿色安全区） 内。这里天空呈现出一种近乎自然的淡蓝色，空气可以短暂呼吸，甚至有经过基因改造的植被在顽强生长。从远处看，“摇篮”就像一座矗立在废土中的象牙塔，一个与世隔绝的学园都市。

核心定位与双重身份
官方定位： 对外，“摇篮”是SRB与“摇篮”技术支持机构联合创办的精英教育学园，旨在培养下一代地表回收事业的领导者、科学家和技术专家。其毕业生被誉为“方舟的希望”，是人类重返地表的先驱。
真实身份： 在内部，它是不折不扣的“圣柩人形”候补者培养基地。这里的所有“学生”都是未来的圣柩人形，她们的整个成长过程都被精心设计，以最大限度地提高未来与战术躯体融合的成功率和心智稳定性。
优渥环境与无声的契约
“摇篮”为少女们提供了尘纪元最顶级的物质生活，其奢华程度甚至超过了方舟内部的普通公民：

伊甸园般的校园： 校园内有四季恒温的生态穹顶，有旧时代的自然景观——有溪流、森林、花圃。少女们可以在阳光下进行户外活动，享受着地表上绝无仅有的奢侈。
丰富的教育资源： 她们接受的教育涵盖了从古典文学、艺术音乐到高等物理、战术指挥、机械工程等各个方面。这不仅是为了让她们成为合格的战士，更是为了塑造她们丰富、坚韧且稳定的人格，以抵抗未来改造手术带来的精神冲击。
无微不至的关怀： 每个少女都有专门的辅导员（通常是退役的、心智稳定的圣柩人形或专门的心理学家），负责她们的心理健康和日常生活。食堂提供营养均衡且美味的食物，宿舍环境舒适温馨。
这种优渥的生活并非没有代价。这是一种无声的契约：“摇篮”给予她们最美好的童年和青春，而她们将以自己的未来作为回报。 “成为圣柩人形，守护人类”被塑造为一种至高无上的荣耀，是她们回报这份恩情的唯一方式。校园的宣传栏、典礼和课程中，处处都充满了对现役圣柩人形英雄事迹的赞美，她们被描绘成拯救世界的女神。

学园化的管理模式与年级划分
“摇篮”完全模仿旧时代的寄宿制学园。

年级划分：
低年级（启蒙期）： 接收4-10岁的女童（主要是战争遗孤或通过基因筛选的“被选中者”）。此阶段侧重于基础教育、艺术培养和集体生活适应，同时进行潜移默化的心理塑形，植入“奉献”与“荣耀”的价值观。她们会接触到简化的机械拼装和逻辑游戏，作为未来适应战术躯体的早期训练。
中年级（塑造期）： 11-15岁的少女。课程开始引入更专业的知识，如战术模拟、基础武器理论、纳米尘环境生存知识。体能训练和心理韧性训练也逐渐加强。她们会开始在模拟器中进行初步的战斗体验。同学之间的竞争也开始出现，优异者能获得更好的资源和关注。
高年级（待命期）： 16-18岁的少女。她们已经完全具备了成为圣柩人形的知识和技能。此阶段的训练最为严苛，包括高强度的实战模拟、与现役圣柩人形的交流、以及对改造手术的详细理论学习。她们会结成模拟小队，进行协同作战演练。这一时期的少女们关系最为复杂，既有深厚的友谊，也存在着对未来的共同恐惧与期望。
“毕业生”： 当高年级少女的各项指标（生理、心理、技能）达到标准，且前线出现人员需求时，她们就会“毕业”。毕业典礼隆重而庄严，但所有人都心知肚明，典礼之后，等待她们的将是那场决定命运的改造手术，以及被派遣到某一艘陆行舰，交由前线指挥官领导的未知未来。
成为圣柩之后：改造手术的具体过程无人得知，成为圣柩的少女们会最大程度复原其本来的面貌，以加强自我认知，基本的生理得到保留，改造过后经过高规格的冷却槽进行恢复，这时候“摇篮”会再次评估少女们的能力与适应性以决定她们未来的命运。

未来：摇篮会根据毕业生的综合实力与圣柩适应性决定要将圣柩人形们送往何处，低等级的人形会分配给新人指挥官与他们共同成长，高等级的人形会优先响应功绩排行榜前列的王牌指挥官的接收申请，暂时没有指挥官能满足接收条件的顶级人形会进入摇篮的最高规格的冷却槽中维持着最佳状态，等待被“唤醒”，人形们私下里管这个叫“冬眠”。


“自愿者”与“被选中者”
“摇篮”的生源分为两类，这在学园内部造成了微妙的阶级和心态差异：

被选中者（The Chosen）： 大多是“摇篮”计划从各地收养的战争遗孤。她们自记事起就在“摇篮”生活，这里是她们唯一的家。她们对“摇篮”有着深厚的归属感，也更容易接受“成为圣柩”的命运，将其视为理所当然的责任。
自愿者（The Volunteers）： 一些来自方舟或地表据点的少女，因为崇拜圣柩人形、渴望力量、或为了给家人换取更好的生活条件而自愿加入。她们带着对外界的记忆和认知，心态更为复杂。她们或许对“荣耀”的宣传更为警惕，但也可能因为强烈的个人动机而表现出更强的意志力。这两类少女之间的互动，构成了“摇篮”内部丰富的剧情线索。

尽管“摇篮”竭力营造出光明、积极的氛围，但无形的压力和悲剧色彩无处不在：

心照不宣的未来： “改造手术”、“剥离”、“心智融合”这些词汇是禁忌，但每个高年级少女都通过各种渠道了解到了真相。她们在图书馆的角落、在深夜的宿舍卧谈中，分享着彼此的恐惧和决心。她们会偷偷为即将“毕业”的学姐举办告别派对，那是一种夹杂着祝福与悲伤的复杂仪式。
“冷却槽”的预演： 校园医务室里有小型的“精神舒缓舱”，功能类似于陆行舰上的“冷却槽”。当少女们在训练中表现出过度的压力或情绪波动时，会被要求进入其中进行“放松治疗”。这既是保护措施，也是让她们提前适应未来“维护”过程的手段。
无处不在的监控： 整个“摇篮”都处于严密的监控之下，少女们的每一项生理数据、每一次情绪波动、每一次私下交谈都可能被记录分析，用以评估她们的“适格性”。
荣耀的代价： 毕业后，少女们会成为前线的英雄。她们的照片和事迹会被送回“摇篮”，激励着下一代。但那些在战斗中“损毁”或“心智崩溃”的人形的消息则会被严格封锁，她们的存在会被悄无声息地抹去，仿佛从未存在过。

“摇篮”是一个矛盾的集合体。它既是保护少女们免受废土之苦的乌托邦，也是将她们推向战场的流水线。在这里，少女们拥有了最珍贵的青春回忆和深厚的羁绊，而这些美好的记忆，最终会成为她们在冰冷的机械身躯中，抵抗心智崩溃、维系人性的最后一道防线。当指挥官在陆行舰上与这些来自“摇篮”的圣柩人形互动时，他/她接触到的不仅仅是一个强大的兵器，更是一个承载着“摇篮”中所有光明与阴影的、曾经有血有肉的灵魂。
</摇篮设定>