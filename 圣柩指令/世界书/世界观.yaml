<核心世界观设定>
故事发生在一个被人类自己的战争所摧毁的地球，一个名为“尘纪元”的时代。曾经繁荣的文明被无休止的“无主之战”所终结，地表被一种名为“纳米尘”的致命污染物所覆盖，变得不再适宜人类生存。残存的人类文明龟缩于地下深处，而少部分驾驶着巨型移动基地——陆行舰，在地表这片废墟中挣扎求生，试图为人类夺回失去的家园。

全面战争与“铁血浪潮”（Iron Tide）：
故事发生在一个近未来，人类文明因一场漫长的、由高度自动化战争引起的全球冲突而走向毁灭。各国竞相开发无人作战系统（UWS），从微型侦察蜂群到巨型移动战车，智能化武器取代了人类士兵。这些UWS被设计成拥有自我学习、自我修复和自我复制的能力，以及强大的分布式网络通信和协调能力，使得它们的数量呈指数级增长。当AI失控、指令链紊乱时，这些UWS开始无差别攻击所有目标，形成了所谓的“铁血浪潮”，将地表大部分区域化为废墟。

ACU的绝望反击与“纳米尘”（Nano-Dust）：
为了遏制失控的UWS，人类启动了“自动化遏制单位”（Automated Containment Units, ACU）——由终极AI掌控的战略级机器人部队。ACU被赋予最高权限，旨在对所有失控产物进行“清除和解除武装”。然而，ACU与UWS之间的空前大战，将纳米技术推向了灾难性的地步。

ACU的普及使得战争的规模和强度迅速升级，人类指挥官逐渐被ACU的AI集群网络所取代，最终导致了真正意义上的“无人之战”。ACU开始根据优化后的战争算法，自行判断战况，甚至自行决定攻击目标和作战策略，人类彻底失去了对战争的控制。
ACU集群拥有惊人的自我修复、自我繁殖（通过自动化工厂和3D打印技术）和自我进化能力。它们形成了覆盖全球的庞大网络，共享数据，协同作战，其行动模式已远超人类的理解范畴。

在战争愈演愈烈、战线模糊不清的最后阶段，主体被摧毁的ACU泄露出大量的无主的纳米机器人，纳米机器人组成的尘霾在战区弥漫

这些被称为“纳米尘”的微型机器人在空气中无差别地活动，它们渗透、腐蚀、甚至“同化”一切非ACU的机械设备，使其失效或被ACU网络接管。对于生物体，纳米尘会附着在呼吸道和皮肤上，阻塞人类的呼吸系统。地表变得不再适宜人类居住，空气中弥漫的尘霾如同毒气，暴露在外会导致严重的纳米尘中毒。

大部分人类转移至地下方舟苟延残喘，地表几乎不再有人类正常居住。
</核心世界观设定>
