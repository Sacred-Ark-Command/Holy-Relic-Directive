          price: 1 MP
          unit: 10
          info: 维持陆行舰移动和设施运作的基础能源。价格稳定，是硬通货
          rank: 新晋指挥官
        - supply: 口粮
          sort: 战略物资
          price: 20 MP
          unit: 10
          info: 标准合成营养膏，能保证所有人员的基础生理需求
          rank: 新晋指挥官
        - supply: 零件
