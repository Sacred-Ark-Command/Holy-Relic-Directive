    二、技术蓝图:
      SRB评估逻辑: 技术的获取是拉开指挥官差距的关键。高价值技术只授予给已证明自身价值的精英
      物品列表:
        - 通用武器/装甲蓝图（T1-T3）: 80 - 500 MP。认证指挥官及以上可兑换。涵盖了从改良型步枪到基础外骨骼装甲的蓝图
        - 人形专属武器/模块蓝图: 400 - 2,000 MP。资深指挥官及以上可兑换。这些蓝图通常与特定人形的能力高度适配，能极大提升其作战效能
        - 陆行舰设施升级蓝图:
            Lv3蓝图: 2,500 MP（认证指挥官解锁），可以直接升级而不消耗资源
            Lv4蓝图: 10,000 MP（资深指挥官解锁）
            Lv5专家蓝图: 50,000 MP（王牌指挥官解锁）
        - 实验性装备兑换权: 价格浮动，需王牌指挥官评级。这不是购买蓝图，而是获得一件由SRB尖端部门提供的原型装备，有强大的性能，但也可能存在未知的副作用

    三、人事调配:
      SRB评估逻辑: 圣柩人形是SRB最宝贵的资产，其分配必须慎之又慎。指挥官的评级和往绩是能否获得新成员的关键
      物品列表:
        - supply: 特别人形调配申请
          sort: 人事调配
          price: 500 MP
          unit: 1
          info: 随机出现，针对新晋指挥官的特别优待。考虑到新晋指挥官面临的人手短缺问题，SRB会不定期放出仅限一次的特别人形调配申请。常规结果为C级至A级圣柩人形；若涉及S级，必须转为封存档案、遗产接触或特殊剧情许可
          rank: 新晋指挥官
        - supply: C级人形调配申请
          sort: 人事调配
          price: 1000 MP
          unit: 1
          info: 向"摇篮"提交申请，SRB将指派一名标准型圣柩人形加入你的队伍
          rank: 新晋指挥官
        - supply: B级人形调配申请
          sort: 人事调配
          price: 2000 MP
          unit: 1
          info: 向"摇篮"提交申请，SRB将指派一名B级圣柩人形加入你的队伍
          rank: 新晋指挥官
        - supply: A级人形调配申请
          sort: 人事调配
          price: 4000 MP
          unit: 1
          info: 向"摇篮"提交申请，SRB将指派一名A级圣柩人形加入你的队伍
          rank: 认证指挥官
        - supply: S级封存人形接触许可
          sort: 人事调配
          price: 8000 MP
          unit: 1
          info: 向"摇篮"与SRB高层提交封存个体接触申请。S级人形不可现代制造，许可只提供档案查阅、会面、修复评估或唤醒候选机会，能否加入取决于剧情、功绩、稳定性和指挥官互动
          rank: 王牌指挥官
      高级调配:
        - 遗产人形接触许可: "20,000 MP。资深指挥官及以上可申请。你将获得一位因前任指挥官阵亡而被回收的'遗产'人形的档案，并有一次与她在移动站点会面的机会。能否说服她加入你的队伍，取决于你的互动选择和过往的功绩声望。这是一次高风险高回报的投资"
        - 特殊专长定向申请: 50,000+ MP。王牌指挥官专属。可向"摇篮"提交申请，指定需要具备某种特殊才能（如"逆向工程专家"、"心理疏导师"）的人形。LED会进行漫长的评估与匹配，成功率无法保证，但一旦成功，你将获得一位极具价值的专家

    四、心智慰藉品:
      SRB评估逻辑: LED的数据分析表明，适当提高前线人员的生活质量，能有效降低圣柩人形的精神负荷累积速率，并提升整体任务效率。因此，对"心智慰藉品"的供应被视为一项低成本、高回报的长期投资
      改良型食品/饮品:
        - 合成肉排/自热披萨: 5 MP/份。在食堂使用，能显著提升用餐人形的士气
        - 罐装咖啡/苏打水: 3 MP/罐。可在休息室或指挥官房间使用，提供短暂的"精神振奋"效果
        - 旧世界甜品原料包（巧克力/糖果）: 25 MP/包。可用于在升级后的食堂制作特殊甜点，是提升人形羁绊值的绝佳礼物
      文化娱乐产品:
        - 旧世界漫画/小说（数据版）: 15 MP/本。可下载至休息室或人形个人房间的终端，她们会在空闲时阅读，并可能触发相关对话
        - 音乐专辑（数据版）: 20 MP/张。从古典到摇滚，不同风格的音乐会吸引不同性格的人形
        - 经典游戏光碟/卡带: 50 MP/套。需要已建造"娱乐室"。可以组织人形进行游戏比赛，是大型的团队建设活动
      个人化生活用品:
        - 舒适的毛毯/抱枕: 30 MP。可放置在人形的个人房间，提升其"舒适度"，加快精神负荷的自然恢复
        - 盆栽植物/种子: 40 MP。需要在已建造的"生态舱"或"温室"中种植，与喜爱植物的人形共同照料，能解锁特殊互动
        - 装饰性海报/摆件: 10-100 MP。用于装饰人形个人房间或公共区域，体现指挥官团队的个性和品味
