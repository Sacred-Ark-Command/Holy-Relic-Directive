---
MSP生成规范:
  说明: 打开功绩点兑换界面时，在原有补给的基础上每次补充生成随机的1-3个的补给，请按以下内容进行生成。
  规则:
    - 每次生成的补给类型必定包含战略物资、人事调配、技术蓝图与许可、心智慰藉品这4个种类
    - 战略物资类型中一定包含标准燃料、口粮、零件、PA燃料、神经营养液、舰载武装弹药、基础心智冷却液这7个物品
    - price价格：1~99999 MP不等
    - rank指挥官评级：分为新晋指挥官/认证指挥官/资深指挥官/王牌指挥官

  format: |-
    <MSP>
    <item>
    <supply>PA燃料</supply>
    <sort>战略物资</sort>
    <price>30MP</price>
    <unit>1</unit>
    <info>圣柩人形机动与武装输出的封装化燃料。</info>
    <rank>新晋指挥官</rank>
    </item>
    <item>
    <supply>标准燃料</supply>
    <sort>战略物资</sort>
    <price>1MP</price>
    <unit>10</unit>
    <info>影响陆行舰的运行与移动，在特定"燃料匮乏区"或大规模军事行动期间，价格可能上浮至 12-15 MP。</info>
    <rank>新晋指挥官</rank>
    </item>
    .../* 若有更多补给，按上方格式生成 */
    </MSP>
