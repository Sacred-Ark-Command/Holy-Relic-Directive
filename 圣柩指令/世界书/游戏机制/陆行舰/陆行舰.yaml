---
陆行舰:
  定义: 废土上的移动方舟，SRB在地表进行远征的核心战略单位
  功能集成: 集居住、指挥、生产、科研、防御于一体的巨型移动堡垒
  核心作用:
    - 指挥官与圣柩人形小队在地表唯一的安全港湾
    - 衡量指挥官实力与功绩的直观体现
  设计理念: 兼顾军事功能与维系人性的生活需求，是冰冷科技与温暖日常的交融体
  基础配置:
    - 内部设施: 配备先进的空气净化系统，拥有维护舱、实验室、加工厂、医疗舱、生活区、训练场、武器平台等
    - 移动方式: 依靠巨型履带在崎岖地表移动
    - 防护系统: 拥有厚重的防ACU装甲和高级纳米尘净化系统
  指挥与运营:
    - 指挥结构: 由一名前线指挥官统领，负责统筹资源、规划路线、指挥作战
    - 资源消耗: 运营需要大量能源燃料、稀有金属、物资补给等

  分级与型号:
    升级方式: 指挥官通过积累功绩点MP并消耗大量资源，申请升级或更换更高级别的舰体
    级别划分:
      拓荒者级:
        定位: 新手指引舰，基础作业平台
        获取方式: FCA毕业新任指挥官的“初始包裹”
        描述: 外形粗犷，像加装了装甲和履带的工业驳船，满是锈迹和划痕，涂装为剥落的SRB标准灰色
        口号: 能动就行
        尺寸: 长约200米，宽约60米，高约40米
        动力核心: 老旧的“地热/聚变混合型”能源核心，出力低，噪音大，效率不高
        初始设施:
          - 基础舰桥
          - 简易整备室
          - 单人冷却槽室
          - 食堂
          - 圣柩休息室
          - 指挥官隔间
          - 基础资源加工站
        防御系统: 仅有几座近防炮塔，用于驱赶小型零散ACU
        特性:
          - 升级潜力巨大，但一切需从零开始
          - 能源上限低，无法同时支持多个高耗能设施
          - 基础能耗相对较低，适合初期探索
          - 初始装甲薄弱，需依靠人形战术弥补
      远征军级:
        定位: 标准远征舰，战术中坚
        获取方式: 评级达到资深指挥官后，消耗大量资源由拓荒者级升级而来
        描述: 结构优化，装甲更厚重，内部空间扩展，布局更合理，拥有独立科研区域
        特性:
          - 能源核心强化，可支持更完善的设施体系
          - 拥有预留的模块化升级接口，可安装特殊模块
      主宰级:
        定位: 旗舰级单位，区域控制核心
        获取方式: 功绩排行榜顶尖指挥官完成史诗级任务后获得的特殊奖励或兑换权限
        描述: 行走的要塞，SRB技术结晶，舰体庞大，采用稀有的自修复合金装甲
        特性:
          - 拥有双联动力核心，可为实验性武器供能
          - 拥有多个专属的顶级设施
          - 自带强大的舰载武器系统
          - 维护成本极为高昂
        生态一体化:
          - 拥有近乎完美的生态循环系统，可种植真实植物，拥有模拟天空穹顶
          - 生活设施豪华程度堪比方舟核心区

  核心内部设施:
    舰桥:
      描述: 陆行舰的神经中枢，中央悬浮巨大全息战术沙盘，指挥官座位居中，被环形控制台包围
      功能: 战术指挥、路线规划、资源监控、与SRB总部通讯
      互动: 圣柩人形汇报工作，或在非战斗时段于此观看废土风景
    整备室:
      描述: 宽敞明亮，弥漫机油和金属味，排列武器挂架和备用装甲。初始状态简陋，仅有武器架和故障维护终端
      功能: 人形武器更换、装备升级、战术模块安装调试，通过巨大升降平台快速部署
      互动: 指挥官可在此查看配置、与保养装备的人形交谈、给予鼓励以略微提升心智稳定度
    冷却槽室:
      描述: 安静私密，光线柔和，温度恒定，空气中漂浮心智冷却液特有的微甜医用气息。初始只有一个冷却槽
      功能: 圣柩人形进行深度精神修复的核心设施，升级可缩短修复时间、提高效果
      互动: 建立深层羁绊的核心场景，指挥官可通过陪伴、播放音乐、讲述外界事情来加快恢复并加深羁绊
    食堂:
      描述: 初始状态像简陋厨房，只有金属桌椅，食物由自动烹饪机制作，味道单调
      功能: 用餐和社交场所，可消耗食材制作不同料理，为人形提供暂时属性或心情加成
      互动: 触发日常剧情的主要场所，可与人形互动、加入游戏、分享找到的旧世界珍宝
    圣柩休息室:
      描述: 最具生活气息的公共空间，初始只有破旧沙发和官方频道电视。可升级添加书架、投影仪等
      功能: 触发随机日常事件的主要场所，升级可添置图书角、游戏机、植物园等娱乐设施
      互动: 指挥官可在此与休息的人形闲聊、了解兴趣、赠送旧世界遗物作为礼物
    指挥官的房间:
      描述: 初始为狭小整洁的私人空间，有行军床、办公桌和纪念品柜
      功能: 存档、整理个人物品、回顾剧情和资料
      互动: 羁绊加深后，人形会留下小礼物（咖啡、花、便签）。关系亲密的人形可能会前来拜访
    科研中心:
      描述: （拓荒者级初始不具备）充满科技感的独立舱室，初期只有主分析仪和空置研究平台
      功能: 分析ACU残骸和地表资源，逆向工程新蓝图，加工原材料
      互动: 对科研感兴趣的人形会在此帮忙，可与她们讨论研究方向
    资源加工站:
      描述: 充满噪音和粉尘的区域，巨大机械臂分类、熔炼、重塑回收废料
      功能: 将废料转化为建材、合金、燃料，升级后可自动化生产消耗品
      互动: 对机械感兴趣的人形会在此观看，可能提供提高效率的建议
  舰载AI:
    基础配置: 每艘拓荒者级都配备基础舰载AI处理日常庶务
    升级可能: 可通过探索旧世界遗迹找到特殊的“AI核心”，为陆行舰赋予独特个性和语音的“灵魂”
