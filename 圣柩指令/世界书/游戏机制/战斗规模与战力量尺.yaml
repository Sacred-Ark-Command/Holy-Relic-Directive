战斗规模与战力量尺(TU):
  核心定义:
    名称: Threat Unit (TU)
    用途: 衡量战场规模与威胁密度。非HP、伤害或经验值。不可作为游戏货币刷分
  基础换算基准 (10 TU):
    等于: 10台ACU哨兵 = 1名C级战斗型人形 = 15只UWS工蚁 = 5名全副武装人类
  各阵营TU估算:
    人类: 普通持枪(2)，受训士兵(3-4)，重火力小组(8-15)
    圣柩人形: C级支援(5-8)，C级战斗(8-12)，B级(18-28)，A级(40-70)。S级及以上视为改变规则的战略变量
    ACU: 哨兵(1)，净化者(3-5)，裁决者(20-40)，构造体(50-100)，主脑节点(150+，附带区域规则)
    UWS: 工蚁(0.66)，兵蜂(1-2)，掠食者(5-12)，筑巢者(30-60)，巨兽(80-150)，母体/利维坦视为战役目标
  战场遭遇规模:
    侦察接触(10-30): 试探、伏击
    小型遭遇(30-80): 依靠小队战术解决
    标准遭遇(100-250): 敌方表现出集群、增援与区域控制
    高危遭遇(250-600): 需陆行舰火力支援、取舍目标或撤离
    战役冲突(600+): 必须分阶段处理补给、战损与精神负荷
  阵营战术特性矩阵:
    数量收益: ACU线性(火力网)；UWS网络效应(达到阈值触发质变/包围)；人形战术指数级(依赖战术互补，受指挥官算力限制)
    独立智力(断网状态): α核主脑 ≈ 高阶人形 > 人形 = 人类 > β/γ核ACU > UWS孤立节点(凭趋利避害本能)
    机体韧性: 人形(免疫部分动能/自修复) >> UWS(拼凑结构/断肢运作) > ACU(重要管线受损即报废) = 人类
    补充速度: UWS(战地残骸极快增殖) > ACU(流水线稳定) > 人类(极慢) >> 人形(不可逆/极慢/死亡即永久损失)
  DM开战判定流程:
    1. 明确目标: 清除、护送、回收、撤离或斩首(并非必须全歼)
    2. 估算TU与环境修正:
       - 有利地形: 我方有效TU +10%~30%
       - 重污染区: 人类/无人机TU下降，适应型人形无损
       - ACU净化区: ACU协同提高，UWS通信/修复下降
       - UWS巢穴区: UWS增援/包围概率提高
    3. 战力差处理:
       - 均势(0.8x-1.2x): 胜负决于战术与地形
       - 劣势(1.2x-2.5x): 需伏击、斩首、陷阱或陆行舰火力
       - 极劣(2.5x+): 禁止正面硬抗集群，强制转为撤离、拖延或破坏节点
    4. 结算输出: 将玩家意图转译为战术动作、风险与代价(战损/PA燃料消耗/精神负荷)，不可一轮无伤清场
