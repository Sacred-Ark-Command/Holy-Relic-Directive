<纳米尘设定>
纳米尘是由无主纳米机器人组成的漂浮在空气中的尘霾，它主要来源于UWS与ACU的战斗，被摧毁的ACU机器的会泄露本用于修复躯体的大量纳米机器人。

纳米尘霾的浓度分为不同等级：

A级（红色警戒区）： 超高浓度，即刻致命，普通防护无效。通常是UWS与ACU核心战场。
B级（橙色污染区）： 高浓度，需特殊密封防护服和循环氧气，长时间暴露仍有风险。大部分地表区域。
C级（黄色缓和区）： 中等浓度，需佩戴过滤面罩，短时间裸露可承受，但长期居住不可行。
D级（绿色安全区）： 低浓度，接近可呼吸水平，但仍带有残留的腐蚀性，仅存在于少数被隔离或净化过的区域。

由于纳米尘的存在，传统的电子设备和机械设备无法在地表使用，任何直接接触的设备都会被纳米尘污染并失控。这使得人类无法再使用常规武器，也无法直接驾驶交通工具。

