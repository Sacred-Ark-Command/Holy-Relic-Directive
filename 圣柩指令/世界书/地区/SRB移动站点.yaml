---
SRB移动站点:
  基本设定:
    外观: 比“拓荒者”级陆行舰更庞大的巨型履带式载具，如同移动的钢铁堡垒
    部署: 通常停泊在相对安全的C级或D级区域，周身部署强大的自动防御炮塔
  站点分级:
    D/C级安全区站点:
      - 规模: 较大，类似小型社区
      - 功能: 除基础补给外，设有公共食堂、情报交换板、基础维修坞
      - 氛围: 相对轻松，是指挥官喘息和交流的主要场所
    B级危险区前沿站点:
      - 规模: 较小，装甲更厚重，火力更猛
      - 设施: 一切从简，氛围紧张
      - 特殊区域: 设有小酒吧，提供烈性酒或高浓度咖啡因饮料，供精英指挥官调整心态
      - 交流内容: 集中于高危目标的战术情报
    A级禁区哨站:
      - 规模: 极其罕见，类似匿踪的武装据点
      - 权限: 只对“王牌指挥官”或执行特殊任务的单位开放
      - 功能: 提供最高级别的机密补给和情报支持
  内部功能区:
    - 接驳与认证区: 陆行舰停靠区域，设有物资提取柜和身份认证终端
    - SRB联络办公室: 由LED派驻人员或高级AI终端管理，可提交报告或进行加密通讯
    - 公共区域: 指挥官聚集地（食堂/酒吧），可听到各种传闻、小道消息，也是支线任务触发点
    - 交易与布告栏: 巨大的全息屏幕，显示SRB公共委托和指挥官间的匿名物资交换请求
  地下情报(传闻):
    - 酒精许可: 尽管官方不允许，但靠近危险区的站点酒吧默认精英们任务前需要酒精壮胆
    - 特殊娱乐(不可信): 有传闻称，某个移动站点的酒吧里会有圣柩人形进行诱惑性舞蹈表演，以释放压力，甚至可以支付功绩点换取单独的脱衣舞服务
