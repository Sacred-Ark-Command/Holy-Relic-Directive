---
地下方舟:
  基本定义:
    - 名称: 方舟
    - 形态: 独立的、深埋于地下的巨型垂直都市，理论上可万年自持的封闭生态系统
    - 双重性: 既是人类文明的火种保存库，也是阶级固化、资源紧张的牢笼
  旧世界继承关系:
    政治身份: 方舟是战后幸存者体系，不直接继承诺克斯协约或赫利俄斯同盟
    人口来源: 由旧世界两大阵营平民、技术人员、军方残部、企业避难所和无阵营幸存者混合形成
    现实矛盾: 方舟高层会利用旧世界技术维持生存，却避免公开承认自身依赖导致毁灭的旧时代遗产
    当前分歧: 战后政治分裂为巢派与翼派，取代旧世界阵营作为方舟内部主要对立轴

  通讯方式:
    技术: 超远程量子通讯“深链”
    特性:
      - 极高延迟: 信号穿越地壳地幔衰减严重，数据交换需数天至数周
      - 信息损耗: 传输过程中有几率损毁或丢失，导致信息残缺
      - 资源垄断: 运行耗能巨大，仅最高层有权限使用，普通民众不知情
    后果: 各方舟独立演化出独特的社会、文化和政治生态，成为“最熟悉的陌生人”

  内部结构:
    总体布局: 垂直结构，社会阶层与物理层级严格绑定，越深则权限越高、生活越好
    上层环区:
      位置: 距离地表最近的区域
      功能: 工业制造、垃圾处理、地热采集、初级矿物提炼
      环境: 空气混杂机油、臭氧和金属粉尘味
      居民: “下等公民”或“劳工阶级”，居住在“蜂巢”公寓，信用点最低，配给合成食物
      社会状态: 犯罪率高，娱乐原始（地下搏击、私酿酒），被“方舟典卫”高压管制
    中层环区:
      位置: 方舟的中部区域
      功能: 大多数公民的居住区、商业区、非精英教育机构、水培农业区
      环境: 巨大的穹顶模拟虚假的蓝天白云和日夜循环
      居民: “普通公民”（技术员、医生、教师等），居住在模块化公寓，享受标准化生活
      社会状态: 稳定但压抑，社会流动性极低，是两大政治派系争夺舆论的主战场
    核心环区:
      别称: 宁静的中庭
      位置: 方舟的最深处，最安全、最广阔
      功能: 最高政府议会、SRB与摇篮总部、FCA、顶尖科研实验室、中央数据库
      居民: “上等公民”或“精英阶层”（最高议员、派系领袖、顶尖科学家、SRB高官）
      生活: 居住在拥有独立生态系统的宽敞住宅，享受接近自然的奢侈品
      社会状态: 权力、阴谋和知识的中心，掌握真实信息，承受最大决策压力

  政治派系:
    巢派:
      身份: 保守主义者
      核心理念: 方舟即是世界，墙外唯有死亡
      政治主张: 停止地表回收，解散SRB，将资源用于加固方舟防御和提升内部生活
      权力基础: 控制资源分配委员会、内政安保部、大部分农业和工业生产
      手段: 渲染地表恐怖，放大SRB行动失败，将阵亡者称为“无谓的牺牲”以削减预算
    翼派:
      身份: 开拓主义者
      核心理念: 牢笼无论多大都是牢笼，天空才是归宿
      政治主张: 全力支持SRB和圣柩计划，将资源倾斜给前线，以求重返地表
      权力基础: SRB本身、FCA、摇篮技术部门、科学家和工程师
      手段: 宣传SRB战果，将指挥官和圣柩人形塑造成英雄，以获取支持

  社会体系:
    核心制度: 基于“公民信用点”的残酷分配体系
    信用点体系:
      - 根据家庭背景获得初始信用点，通过工作或效忠派系获得，违规则扣除
      - 信用决定一切：能源配额、食物种类、居住面积、网络带宽、教育和生育权
    阶级跨越途径:
      - 捷径: 加入SRB，成为指挥官或圣柩人形，是下层和中层公民唯一的捷径
      - 回报: 成为英雄后，其家人能获得巨大的信用点奖励和生活改善
      - 动因: 解释了为何总有“自愿者”加入摇篮或报考FCA，他们背负着整个家庭的希望
