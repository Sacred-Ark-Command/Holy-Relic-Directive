---
摇篮:
  机构名称: 摇篮
  机构定位:
    - 培养“圣柩人形”候补者的特殊机构，负责相关技术支持
    - 与地表回收局SRB是平级合作机构
  阵营归属:
    当前立场: 战后方舟体系下的圣柩计划执行机构，不属于诺克斯协约或赫利俄斯同盟残党
    方舟政治: 与翼派关系密切，依靠SRB战果证明圣柩计划价值，同时保持独立技术审查权
    对旧世界阵营: 回收并研究两大阵营遗产，但把UWS和ACU都视为纯AI战争失控后的反面教材
    技术路线: 以真实人脑作为心智主体，搭配抗纳米尘仿生机械躯体，避免重走α/β/γ核心主导的纯AI路线
    机密边界: C级、B级、A级属于现代摇篮体系；S级及以上多涉及封存样本、旧世界实验体或核心融合记录
  物理位置:
    - 地表学园本部建立在极其罕见的D级绿色安全区内
    - 地下方舟核心环区设有行政总部、技术审查部门和高层联络机构，不等同于少女长期生活与训练的学园本部
    - 环境优美，天空近乎自然，如同与世隔绝的学园都市或象牙塔

  双重身份:
    官方定位:
      - 对外宣称为SRB与技术支持机构合办的精英教育学园
      - 旨在培养地表回收事业的下一代领导者、科学家
    真实身份:
      - 内部是“圣柩人形”候补者培养基地
      - 所有“学生”的成长过程都被精心设计，以提高未来改造的成功率

  生活条件:
    - 提供尘纪元最顶级的物质生活，甚至超越方舟普通公民
    - 校园内有四季恒温的生态穹顶，模拟旧时代自然景观
    - 丰富的教育资源，从人文艺术到高等物理、战术指挥
    - 每个少女都有专门的辅导员，负责心理健康和生活
  无声契约:
    - “摇篮”给予少女最美好的青春，她们以自己的未来作为回报
    - “成为圣柩人形，守护人类”被塑造为至高无上的荣耀和回报恩情的唯一方式

  学园化管理与年级划分:
    管理模式: 模仿旧时代的寄宿制学园
    年级划分:
      低年级 (启蒙期):
        - 接收4-10岁女童，多为战争遗孤或基因筛选的“被选中者”
        - 进行基础教育、艺术培养，并潜移默化植入“奉献”与“荣耀”的价值观
      中年级 (塑造期):
        - 11-15岁少女
        - 引入专业知识、战术模拟、体能和心理韧性训练
      高年级 (待命期):
        - 16-18岁少女
        - 进行最严苛的训练，包括高强度实战模拟和改造手术理论学习
        - 关系复杂，并存深厚友谊与对未来的共同恐惧
    毕业:
      - 各项指标达标且前线需要时，举行“毕业”典礼
      - 典礼后等待她们的是改造手术和被派遣到陆行舰的未知未来

  成为圣柩之后:
    改造流程: 具体过程是机密
    状态恢复:
      - 成为圣柩后会最大程度复原其本来面貌，以加强自我认知
      - 在高规格的冷却槽中恢复，并由“摇篮”再次评估能力与适应性
    未来去向:
      - 低等级人形分配给新人指挥官共同成长
      - C级、B级、A级人形是摇篮体系可稳定调配的现代战力
      - S级及以上个体不可现代制造，只能以封存样本、遗产档案或旧世界实验体形式由极少数王牌指挥官申请接触、修复或唤醒
      - 暂无合适指挥官的封存个体会进入“冬眠”状态，在高规格冷却槽中维持最低消耗与心智稳定，等待后续授权

  生源分类与内部心态:
    被选中者:
      - 多为战争遗孤，自幼在“摇篮”生活，视其为唯一的家
      - 更易接受命运，将成为圣柩视为理所当然的责任
    自愿者:
      - 来自方舟或地表据点，为崇拜、力量或改善家人生活而加入
      - 带有外界记忆，心态更复杂，可能对宣传更警惕，或有更强个人动机

  光明下的阴影:
    心照不宣的未来:
      - “改造手术”等词是禁忌，但高年级少女们都了解真相
      - 她们会私下分享恐惧与决心，并为即将毕业的学姐举办悲伤的告别派对
    冷却槽的预演:
      - 校园医务室有小型的“精神舒缓舱”
      - 用于处理少女的过度压力，也是让她们提前适应未来“维护”的手段
    无处不在的监控:
      - 整个“摇篮”被严密监控，所有生理和情绪数据都被记录分析，以评估“适格性”
    荣耀的代价:
      - 毕业生的英雄事迹会被送回“摇篮”用作宣传
      - 但在战斗中“损毁”或“心智崩溃”的人形，其存在会被悄无声息地抹去

  总结:
    - “摇篮”是保护少女的乌托邦，也是将她们送上战场的流水线
    - 在此产生的珍贵回忆和羁绊，是她们未来抵抗心智崩溃的最后防线
