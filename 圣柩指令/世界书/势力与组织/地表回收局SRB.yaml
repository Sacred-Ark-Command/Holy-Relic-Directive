---
地表回收局:
  机构全称: 地表回收局
  英文名称: Surface Reclamation Bureau (SRB)
  阵营归属:
    当前立场: 战后方舟体系下的人类地表复兴机构，不继承诺克斯协约或赫利俄斯同盟的政治身份
    方舟政治: 主要受翼派支持，目标是重返地表；巢派常以地表风险和资源消耗反对SRB扩张
    对旧世界阵营: 将诺克斯协约与赫利俄斯同盟都视为旧世界灾难源头；可回收两方技术，但不承认任一方正统性
    人员来源: 成员来自混合方舟社会，包含旧世界两大阵营后裔、无阵营幸存者后代、地表幸存者与方舟各阶层志愿者；旧阵营背景只影响技术传承、家族污点或机密档案权限，不决定现代政治立场
    对UWS与ACU: 同时压制UWS和ACU；会利用两者交战制造行动窗口，也会回收残骸进行逆向工程
    技术来源: 方舟库存 | 圣柩计划 | ACU残骸逆向 | UWS巢群数据 | 旧世界遗迹档案
  核心使命:
    - 派遣远征队，清理污染、压制UWS与ACU
    - 回收旧世界技术，并寻找潜在的宜居地带
  主要任务:
    - 调度陆行舰单位，清扫高价值区域
    - 回收科技，测绘污染等级，建立地表据点
    - 任务完成度直接决定陆行舰单位获得的资源倾斜

  核心理念与运作模式:
    基本原则: 绩效至上，优胜劣汰，功绩决定一切
    资源限制:
      - 因地下“方舟”内部对地表回收的争议，SRB资源有限
      - 无法供养庞大常备军，只能将资源作为“种子资金”投入给最有潜力的指挥官
    功绩点系统:
      - 指挥官在地表的所有行动都会被量化为“功绩点”
      - 功绩点直接与资源配给、技术支持和情报等级挂钩

  内部结构:
    中央司令部 (CC):
      - 位于“方舟-01”内，是最高决策机构
      - 负责制定宏观战略，如“火花计划”
    后勤与评估部 (LED):
      - SRB的“心脏”和“大脑”，追踪功绩点，更新“功绩排行榜”
      - 审批资源发放，执行“淘汰机制”
    前线战术学院 (FCA):
      - 专门培养前线指挥官的机构
    回收与再利用部 (RRD):
      - 负责回收阵亡指挥官的资产（陆行舰与圣柩人形）
      - 分析回收的ACU残骸，进行技术逆向工程

  前线战术学院 (FCA):
    定位: 纯粹、高压的精英军事院校，培养能驾驭圣柩人形的“牧羊人”
    招生标准:
      - 年龄与性别: 主要招收18-28岁的男性，少量女性作为补充
      - 背景: 生源多样，包括军人后代、平民、地表幸存者中的优秀个体
      - 核心标准: 极其严格的心理评估，强调同理心、抗压能力和道德底线
    课程设置:
      - 战术指挥与资源管理: 学习陆行舰指挥、战术部署、资源管理
      - 圣柩人形理论与实践: 核心课程，包括心理学、维护与互动、协同作战演练
      - 协同作战演练: 与“摇篮”高年级候补者通过护送交流、远程模拟和封闭演训结成临时小队，影响毕业后的初始配对
      - 地表生存与工程学: 学习纳米尘知识、陆行舰维修、资源勘探等

  毕业与残酷的开端:
    初始包裹:
      - 一艘“拓荒者”级基础型陆行舰
      - 一名通常在协同训练中默契度较高、已完成改造并通过适应性评估的“摇篮”毕业生作为“初始”圣柩人形
      - 仅够短期运作的基础资源包
    放逐与自立:
      - 毕业后，指挥官与人形被直接派遣到地表相对安全的区域
      - 没有指引，只有LED发来的评估开始通知，必须依靠自己挣扎求存

  功绩排行榜与淘汰机制:
    功绩排行榜:
      - 每周更新一次，所有指挥官可匿名查看
      - 展示前100名、平均线和垫底的10%（标记为“观察期”），制造竞争
    资源倾斜:
      - 排名越高，申请高级资源的成功率越高
    淘汰机制 (日落协议):
      - 观察期: 连续四周功绩低于警戒线，补给削减25%
      - 最后通牒: 观察期后仍无起色，将收到一个极具挑战的“翻盘任务”
      - 资产回收: 任务失败或拒绝，RRD将被派遣回收陆行舰和圣柩人形；人形接受隔离评估、创伤干预、封存或重新分配，只有在严重污染、暴走或机密泄露风险下才会执行深度记忆处理；指挥官会被剥夺前线权限，强制召回方舟边缘岗位、降格派驻低级前哨，极端情况下被废土流放

  阵亡与遗产 (遗产协议):
    阵亡处理:
      - 陆行舰自动发送求救信号和战斗记录
      - RRD会不惜代价优先回收圣柩人形小队
    遗产人形:
      - 被成功回收、经验丰富但带有心理创伤的人形，是SRB的重要资产
      - 将她们重新分配给新指挥官前，LED与摇篮会进行稳定性评估；新指挥官需要付出加倍努力赢得信任
    功绩继承:
      - 阵亡指挥官的部分功绩点会转化为“遗产基金”
      - 用于抚恤其家人，或奖励成功接纳其“遗产”人形的新指挥官
