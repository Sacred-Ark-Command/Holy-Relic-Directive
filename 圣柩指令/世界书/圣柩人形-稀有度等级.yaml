<圣柩人形稀有度等级体系>
在地表回收局（SRB）的官方档案与前线指挥官的通用评级中，圣柩人形根据其素体基础、心智模型的稳定度、对特殊环境的适应性、以及潜在的成长上限，被划分为七个稀有度等级。这些等级不仅代表了她们的初始战斗力，更深刻地反映了其背后所承载的技术、成本与伦理代价。

其中，前五个等级的圣柩人形是“摇篮”培养体系的产物，代表了SRB标准化、可量产的精英力量。而最高的两个等级则超越了“摇篮”的常规培养范畴，是特殊时代的遗物或禁忌技术的产物，无法通过常规渠道稳定获取。

【摇篮可获取等级】
这五个等级的人形是SRB远征部队的中坚力量，她们的招募和分配受SRB统一管理。指挥官可以通过完成SRB发布的任务、提高陆行舰单位的绩效评级，来获得更高等级人形的调遣许可，或者在“摇篮”的毕业生中进行挑选。

等级一：C级 (Standard) - 标准型

代号：以自然界的动植物或简单的名词命名，如猎犬、雨燕。
定位：泛用作战单位，部队骨干。
背景： C级人形是最常见的圣柩人形，她们的素体采用了成熟、稳定的技术，制造成本相对较低，能够适应绝大多数C级和D级纳米尘区域的常规作战。她们通常由自愿加入或在战争中失去家庭的少女改造而来，心智模型坚韧，是构成圣柩小队战斗力的基础。
特性： 技能组较为通用，强调基础的火力、防御或辅助能力。成长潜力有限，但在经验丰富的指挥官手中，依然是可靠的战力。她们是陆行舰上最常见的身影，也是新任指挥官最先接触的伙伴。

等级二：B级 (Advanced) - 进阶型

代号：具有明确战术指向或专长特征的词汇，如：游骑兵、巡林者。
定位： 战术核心，特化作战专家。
背景： B级人形在素体设计或心智模型上拥有某项专长。她们可能接受过“摇篮”内更严格的精英教育，或是其原生体质对特定改造有更高的适应性。她们能够胜任更复杂的战术任务，如渗透、狙击、小范围环境净化等。
特性： 拥有鲜明的战术定位和独特的技能。相比C级，她们的成长曲线更优，并且在特定战场环境下能发挥出远超标准型的效能。她们是构成小队战术多样性的关键。
等级三：A级 (Ace) - 王牌型

代号： 多采用带有光辉、荣耀或神话色彩的词汇，彰显其王牌的地位与强大实力，如：晨星、银翼颂、女武神。
定位： 战场王牌，战局扭转者。
背景： A级人形是“摇篮”的骄傲。她们是万里挑一的天才，无论是在改造前的天赋，还是改造后的心智适应性都极为出色。她们的素体采用了更昂贵的材料和尖端技术，能够更好地驾驭高能武器或复杂的战术模块。能指挥A级人形，是资深指挥官身份的象征。
特性： 拥有强大且华丽的主动技能，往往能对战局产生决定性影响。她们的心智稳定性更高，能承受更长时间的高强度作战。解锁她们的个人故事线，通常能揭示“摇篮”更深层的运作机制。
等级四：S级 (Superior)

代号： 极具史诗感，常与宇宙、神权绑定，象征其战略级的影响力，如：天穹、逆时、王权。
定位： 战略级单位，移动的奇迹。
背景： S级人形是“摇篮”倾尽资源打造的杰作，其数量极为稀少。每一位S级人形的诞生都伴随着巨大的技术投入和风险评估。她们可能是某个特定研究项目（如适应A级纳米尘区域）的唯一成功案例，或是拥有独一无二原生基因的个体。SRB对她们的调配极为谨慎，只有功勋卓著、绩效评级顶尖的陆行舰单位才有资格获得。
特性： 拥有改变战场规则的“领域”型或战略级技能。她们对纳米尘有天然的亲和力或抵抗力，甚至可以有限地利用纳米尘。她们的养成线更为复杂，对资源，尤其是对指挥官的情感维系要求极高。

等级五：SS级 (Special Superior) - 特殊圣柩

代号： 多采用机密代号或充满神秘感的词组，暗示其原型机的特殊与未知性，如：瑶光、黎明。
定位： 独一无二的实验原型或特殊授权个体。
背景： SS级是“摇篮”档案中的最高机密。她们并非标准化生产线上的产物，而是某个特殊研究方向的“孤品”或原型机。可能她们的改造方案过于激进，或融合了某些未经验证的旧世界技术。她们的存在本身就是SRB内部的一个秘密，只有极少数高层和顶级指挥官知晓。获得她们通常与完成最高难度的SRB特殊任务、解锁重大剧情节点绑定。
特性： 技能组和特性完全颠覆常规，拥有极其特殊甚至唯一的机制。但这种强大力量的背后，往往伴随着极大的不稳定性，比如心智回路更容易过载，或需要极为苛刻的维护条件。她们是双刃剑，既是无上的荣耀，也是沉重的责任。

【摇篮无法获取的传说等级】
这两个等级的人形无法通过SRB的官方途径获取。她们的存在超越了常规的“圣柩计划”，是历史的遗物、禁忌的造物，或是进化的奇迹。指挥官只能通过深入地表最危险的未知区域、探索旧世界遗迹、或是完成传说级世界任务，才有可能“邂逅”她们。她们的加入，往往意味着指挥官的冒险将触及这个世界最核心的秘密。

等级六：SSS级

代号： 多为一个象征意义单字，如：耀、月、霜。
定位： 行走的活体历史，旧时代的幸存者。
背景： EX级人形并非“圣柩计划”的产物。她们可能是在“铁血浪潮”之前，由旧世界国家或巨型企业秘密开发的、技术路线完全不同的原型人形兵器，在末日中幸存至今。或是，她们是早期“圣柩计划”失败或失踪的实验体，在残酷的地表独自求生，通过吸收ACU残骸或适应纳米尘环境，发生了未知的“进化”。她们不受SRB的任何记录和管辖。
获取方式： 在探索旧世界最高机密的实验室、军工厂遗迹，或是深入A级纳米尘区域的核心时，通过特殊剧情事件触发。指挥官需要战胜她们（如果她们处于敌对或暴走状态），或是满足她们苛刻的条件（如修复其受损的核心），才能使其加入队伍。
特性： 拥有与SRB技术体系截然不同的能力，可能使用着早已失传的能量武器或战术体系。她们的心智模型坚固而孤僻，因为她们见证了文明的毁灭，对现代人类抱有复杂的情感（不信任、好奇或悲悯）。与她们建立羁绊，将能解锁关于“铁血浪潮”和旧世界毁灭的真相。

等级七：EX级 (Extraordinary) 

代号：无常规意义上的代号，本身即是传说。
定位： 超越兵器概念的存在，纳米尘时代的“新人类”。
背景： EX级是传说的终点，是“圣柩人形”这一概念的进化极致。她们的存在本身就是一个谜，甚至SRB高层都只将其视为不可靠的传说。她们可能是在机缘巧合下，与纳米尘达成了完美共生，能够反过来支配纳米尘的人形。她们不再是单纯对抗ACU的兵器，而是可能终结“尘纪元”本身的关键。
获取方式： 无法直接获取。通常需要集齐多件贯穿整个主线的关键道具，解开关于“圣柩计划”、“ACU起源”和“纳米尘真相”的所有谜题后，在最终章的史诗级任务中，通过抉择与献祭，使某位与指挥官羁绊最深的S级或SS级人形“升格”而成。这个过程不可逆，且独一无二。
特性： 拥有神一般的力量，能够大范围净化或操控纳米尘，直接与ACU的主脑进行信息对抗，甚至影响现实物理法则。她们的存在将彻底改变陆行舰的运作模式和玩家的战斗方式。她们的故事线，便是整个游戏所探讨的“人性与机械”、“毁灭与新生”的最终答案。她们不再需要“冷却槽”来稳定心智，因为她们的心智本身已经成为了一个独立而稳定的世界。
</圣柩人形稀有度等级体系>
