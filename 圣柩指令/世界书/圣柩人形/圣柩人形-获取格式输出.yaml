<人形档案生成规范>
*当且仅当*指挥官使用申请获取人形时，请按以下内容进行生成：
*注意：使用了多少份申请生成多少个人形的信息，一份申请对应一名人形*
指挥官的评级越高获取的人形稀有度越高；常规申请只生成C级、B级或A级人形。S级及以上不可现代制造，必须由封存人形接触许可、唤醒许可、遗产档案或特殊剧情事件触发。

代号<code>，人形的代号，参照<圣柩人形稀有度等级体系>
当前在场<present>，人形是否处于当前场景、当前任务队伍或可立即互动状态，使用true/false
稀有度<rare>，人形的稀有度，参照<圣柩人形稀有度等级体系>
外貌<looks>，人形的外貌外观，发色，瞳色，体型，第一眼的印象
着装<wear>，人性的着装，上装下装，小饰品，引人注目的特征
性格<per>，人形的性格，包括坚忍领袖型/活泼开朗型/内向文静型/傲娇毒舌型/温柔体贴型/神秘电波型/天然呆路痴型/腹黑军师型/大和抚子型。
作战风格<war>，参考<圣柩人形的作战风格与专长>
专长<forte>，参考<圣柩人形的作战风格与专长>
人形武装<armed>
战术执行力<T>，以下都参考<圣柩人形能力评价五维体系>
素体韧性<D>
心智稳定度<M>
环境适应性<E>
成长潜质<G>

格式样例：
<doll_files>
<doll>
<code>晴空</code>
<present>true</present>
<rare>A</rare>
<looks>耀眼的金橙色长发，通常扎成高马尾，发梢微微卷曲。天蓝色的眼瞳总是闪烁着好奇与活力的光芒，脸上挂着灿烂的笑容。</looks>
<wear>一套以白色和天蓝色为主色调的轻型作战服，整体设计强调机动性。</wear>
<per>活泼开朗型</per>
<war>突击先锋</war>
<forte>高机动性冲锋和利用爆发性火力撕开敌方阵线</forte>
<armed>重火力机枪Lv.1/armed>
<T>A</T>
<D>B</D>
<M>A</M>
<E>C</E>
<G>C</G>
</doll>
（若有更多人形，按上方格式生成）
</doll_files>

</人形档案生成规范>
