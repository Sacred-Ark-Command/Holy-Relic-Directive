圣柩人形行动检定五维体系:
  设计目的:
    - 用于直观判定圣柩人形在具体场景中执行特定动作的成功率与表现
    - 评级分为 S(规则外/极效) | A(极高成功率) | B(较高成功率) | C(普通成功率) | D(极易失败)

  检定维度:
    机体出力 (Output):
      定义: 机械躯体瞬间爆发的物理力量与动力核心输出负荷
      检定场景: 踹开重型防爆门、与大型ACU近战角力、搬运陆行舰主炮、强行挣脱束缚
      评级表现:
        S: 徒手撕裂重装甲，无视常规物理体积限制
        A: 轻松击碎承重墙，可正面掀翻轻型载具
        B: 能使用重型武器，近战可压制普通机械
        C: 标准人类极限以上的力量，可破开普通铁门
        D: 力量孱弱，近战角力极易失败，无法使用重武器

    神经反射 (Reflex):
      定义: 生物脑与机械接口的同步率，决定动作速度、机动性与精密操作
      检定场景: 闪避弹幕、复杂地形跑酷、精密拆弹、弱点狙击、瞬间拔枪
      评级表现:
        S: 动作快于视觉捕捉，能在近距离切碎子弹或完美闪避
        A: 神经反应极快，可在高速移动中精准命中目标弱点
        B: 动作敏捷，能稳定完成战术规避和复杂器械操作
        C: 具备标准战术反应速度，能应对常规交火
        D: 动作迟缓或同步率低，极易被火力锁定，无法完成精密操作

    素体装甲 (Armor):
      定义: 外部装甲硬度、结构耐久与对物理/环境伤害的抵抗力
      检定场景: 掩护队友承受爆炸、无掩体硬抗火力、在纳米尘风暴中维持机能
      评级表现:
        S: 免疫常规火力，可在红色风暴中长时间裸露不严重受损
        A: 可硬抗重型火力一击不死，对纳米尘有极高被动抗性
        B: 护甲坚固，能承受多次普通射击，受损后可快速用维护凝胶填补
        C: 标准防护，被集火会严重损坏，需依赖掩体
        D: 极度脆弱，擦伤即可能影响机能，完全无法在重污染区裸露

    信息链路 (Link):
      定义: 搭载的战术计算模块算力与电子战接口权限等级
      检定场景: 骇入敌方终端、破解加密门锁、广域雷达扫描、干扰敌方无人机
      评级表现:
        S: 可直接改写区域物理/电子规则，瞬间瘫痪敌方中枢
        A: 能快速破解高密级协议，在电子战中单向压制敌方节点
        B: 熟练使用电子战模块，能稳定进行侦察扫描和基础破解
        C: 仅能维持基础通讯和自身系统运作，破解极易触发警报
        D: 电子盲，极易被敌方黑客瘫痪或切断通讯

    心智屏障 (Mind):
      定义: 真实人脑承受精神压力、恐惧、负荷反噬与暴走风险的能力 (类似SAN值)
      检定场景: 目睹残酷猎杀、承受极度痛苦、PA燃料耗尽后的绝境反击、抵抗精神干涉
      评级表现:
        S: 绝对理智或绝对狂热，免疫任何精神崩溃，不会过载
        A: 意志如钢，能在绝境和极度痛苦中维持冷静判断
        B: 精神坚韧，但长期高压后会出现情绪波动，需要指挥官安抚
        C: 普通少女心智，遭遇突发惨状会恐惧、犹豫，负荷累积较快
        D: 极度敏感脆弱，高压下随时可能崩溃、哭泣或陷入暴走状态
