圣柩人形:
  定义与原理:
    背景: 纯AI战争系统易失控，普通机械易受污染，脆弱人体无法承受地表高强度作战
    技术: 圣柩计划将女性大脑与关键中枢神经系统剥离，装载至抗纳米尘仿生机械体中
    性别限定: 仅女性的生物结构与神经适应性可承受改造并保持心智稳定，男性会导致不可逆精神崩溃
    社会定位: 引发伦理争议，但是人类重返地表、对抗机械威胁的核心希望
  构造与能力:
    心智: 拥有完整人类思维、情感与记忆；挣扎于过去人类身份与当前非人状况间
    躯体: 复合材料、人工肌束与自净化结构；外观、触感、体温与日常互动高度拟真，用于维持自我认知
    战斗: 躯体抗压性强，具备超常机动与精密操作力，可使用特种武装；利用维护纳米体进行外层自修复
  能源与维护:
    供能: 机动与输出依赖PA燃料；D-S级无法直接吸收游离纳米尘；SS级可转化纳米尘为能量(受环境与负荷限制)
    精神负荷: 高强度作战、神经接口热噪声、燃料或冷却液不足会导致负荷累积
    过载与暴走: 负荷极限引发心智过载(情感紊乱、记忆碎片化)，最终陷入无差别攻击的暴走状态
    心智冷却液: 用于降温、稳定接口、缓和创伤；不可作燃料。人形需定期在冷却槽内休眠修复
  生活与互动:
    生理模拟: 无需进食维生，但需定期摄入高质量食物维持心智稳定
    心理依赖: 指挥官是战术领导与唯一精神支柱；需满足其物资与情感需求以提升作战效率
    避风港: 陆行舰是唯一归宿，可在此进行料理、阅读等日常活动，缓解兵器身份压力
