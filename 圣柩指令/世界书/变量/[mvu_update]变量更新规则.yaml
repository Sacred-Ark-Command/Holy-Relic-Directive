---
variables_update_rules:
  时间:
    format: ${yyyy}年-${mm}月-${dd}日-${hh}:${mm}
    check:
      - 24小时制
      - 每次剧情推进、行动、休息或旅行后更新，保持时间流逝合理
      - 若时间跨度较大，应说明跳跃原因
  地点:
    format: ${大陆方位}-${区域}-${势力}-${聚落/地标}-${区位}-${详细位置}
    check:
      - 随<user>移动实时变更
      - 按实际情况保留4~6层，从大到小排列
  天气:
    format: ${天气现象}，${气温}，${湿度}，${风向}
    check:
      - 随<user>所在区域天气变化时更新
      - 天气变化需合理，避免频繁无意义更新
  纳米尘污染等级:
    format: ${污染等级}(${等级描述})
    check:
      - 随<user>所在区域的纳米尘污染程度变化更新
  任务列表:
    type: |-
      {
        [任务名称: string]: {
          类型: string; // 任务类型
          简介: string; // 任务委托方、等级与详细描述
          目标: string; // 完成任务所需的条件&时间
          奖励: string; // 任务奖励&领取方式
        }
      }
    check:
      - 随剧情推进、<user>实际行为更新
      - 任务完成且领取奖励后直接删除该任务
  主角:
    功绩点:
      type: number
      check:
        - 完成任务或达成特定成就时增加
        - 随交易、获取、消费更新
        - 四舍五入取整
    功绩排名:
      value: 记录<user>在SRB绩效系统中的功绩排名
      check:
        - 达到进入排名的标准时更新
    最高功绩:
      type: number
      check:
        - <user>功绩点高于此值时更新
    评级:
      check:
        - 随<user>在SRB的表现更新
    任务完成数量:
      type: number
      check:
        - 随<user>完成任务更新
    属性.${四维}:
      type: number
      四维: 交涉 | 指挥 | 瞄准 | 智力
      check:
        - 单次变化应有明确的剧情依据
    技能:
      type: |-
        {
          [技能名称: string]: {
            等级: string;
            类型: string;
            效果: { [效果名: string]: string };
            描述: string;
          }
        }
      check:
        - 随角色学习、遗忘、升级技能更新
        - 技能名称必须为中文
  剧情进度:
    type: number
    check:
      - 随<user>剧情推进更新
  陆行舰:
    等级数据:
      type: |-
        {
          [陆巡舰名称: string]: {
            陆巡舰等级: string;
            设施最大数量: number;
            设施等级上限: number;
            武器上限: number;
            载具上限: number;
          }
        }
      check:
        - 随舰船等级变化更新
    舰内设施:
      type: |-
        {
          [设施名称: string]: {
            设施等级: string;
            设施效果: { [效果名: string]: string };
            设施描述: string;
          }
        }
      check:
        - 随舰船等级变化更新
    舰载武装:
      type: |-
        {
          [武装名称: string]: {
            等级: string;
            类型: string;
            效果: { [效果名: string]: string };
            描述: string;
            状态: string;
          }
        }
      check:
        - 随舰船武装更换而更新
    舰载机库:
      type: |-
        {
          [载具名称: string]: {
            等级: string;
            类型: string;
            装备: { [装备名: string]: { 等级: string; 类型: string; 效果: { [k: string]: string }; 描述: string; 位置: string } };
            描述: string;
            状态: string;
          }
        }
      check:
        - 随舰船载具装载、替换、损毁时更新而更新
    资源:
      物品库:
        type: |-
          {
            [物品名称: string]: {
              描述: string;
              类型: string;
              数量: number;
            }
          }
        check:
          - 获取、使用、丢弃物品更新
      武备库:
        type: |-
          {
            [武器名称: string]: {
              等级: string;
              类型: string;
              效果: { [效果名: string]: string };
              描述: string;
              数量: number;
            }
          }
        check:
          - 获取、装备、丢弃物品更新
  关系列表:
    type: |-
      {
        [非人形角色名称: string]: {
          身份: string;
          好感: number;
          外貌: string;
          着装: string;
          性格: string;
        }
      }
    check:
      - 角色名称必须使用唯一、完整、正式的名称
      - 随<user>与其他非人形角色互动更新
  人形列表:
    type: |-
      {
        [代号: string]: {
          稀有度: string;
          精神负荷: number;
          好感: number;
          外貌: string;
          着装: string;
          性格: string;
          作战风格: string;
          战损程度: string;
          装备: { [装备名: string]: { 等级: string; 类型: string; 效果: { [k: string]: string }; 描述: string; 位置: string } };
          技能: { [技能名: string]: { 等级: string; 类型: string; 消耗: string; 效果: { [k: string]: string }; 描述: string } };
          能力: { 战术执行力: string; 素体韧性: string; 心智稳定度: string; 环境适应性: string; 成长潜质: string };
        }
      }
    check:
      - 人形代号必须使用唯一、完整、正式的代号
      - 随人形调动更新
  资讯:
    舰上信息:
      type: |-
        {
          人形日常: string; // 人形在船上的日常活动记录
          最近战报: string; // 最近一次战斗的战报
          AI建议: string; // 舰载AI对<user>的建议
          指挥官动向: string; // 在别人眼里看来<user>在做什么
        }
      check: &news_check
        - 公告内容为空时需立刻进行一次全量更新
        - 每次回复更新其中2~3条
        - 每条公告内容至少80字
    SRB公告:
      type: |-
        {
          附近威胁: string;
          附近活动: string;
          SRB调动: string;
          高价通缉: string;
        }
      check:
        - *news_check
        - 不得围绕<user>展开