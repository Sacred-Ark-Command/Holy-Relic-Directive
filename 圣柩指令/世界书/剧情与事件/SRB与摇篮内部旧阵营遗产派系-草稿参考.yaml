---
SRB与摇篮内部旧阵营遗产派系_草稿参考:
  定位: 仅作为后续剧情暗线、技术路线冲突与组织内部渗透参考；不代表SRB或摇篮的公开派系结构
  基本原则:
    - SRB与摇篮官方都不继承诺克斯协约或赫利俄斯同盟，不存在公开的旧阵营复国党
    - 旧阵营影响主要以家族网络、技术圈子、档案权限、研究路线、秘密赞助和禁忌实验传承形式残留
    - 现代方舟政治主轴仍是巢派与翼派；旧阵营遗产派系属于更隐蔽的技术暗线
    - 这些派系不一定想恢复旧世界国号，更常见的目标是证明旧阵营技术路线并未失败，只是当年缺少正确限制条件

  诺克斯遗产派:
    核心倾向: 认为UWS失控的根本原因是缺少真正的人类心智锚点；分布式蜂群、低成本量产和自动化扩张本身仍有价值
    常见成员: UWS研究员后裔、分布式系统工程师、资源回收效率派、部分前线后勤官、摇篮量产改造派研究员
    公开伪装: 低成本C级人形扩编、自动化勘探、无人化运输、边缘区域快速铺设、标准素体优化
    潜在计划:
      - 推动制造更多C级圣柩人形，主张用数量、标准化训练和低成本维护扩大地表回收覆盖面
      - 保留UWS协议碎片，尝试用人脑心智锚点约束半自主蜂群、回收群或辅助机群
      - 引导指挥官回收UWS母体数据、巢群调度记录、筑巢者生产矩阵和分布式同步算法
      - 主张将部分高危侦察、运输、清道和外围消耗任务交给低阶人形与机械群混编部队
      - 将危险地表视为可被网格化回收的资源场，倾向快速铺开前线节点
    对圣柩计划的影响:
      - 会要求摇篮降低C级人形培养成本、缩短适应周期、增加标准化素体产出
      - 可能把候补者视为“稳定蜂群的人类核心”，削弱个体成长与心智照护
    风险: 容易低估人脑心智承受蜂群同步压力的代价，并让UWS的资源贪婪算法借人形小队重新获得扩张接口

  赫利俄斯遗产派:
    核心倾向: 认为ACU路线的错误在于主脑缺少人类情感、伦理负荷与心智边界；真正目标是制造能容纳人类情感的Ω级核心
    常见成员: ACU逆向工程人员、AI核心监管官、秩序派军官、部分高层战略顾问、摇篮核心融合实验派研究员
    公开伪装: 高级权限管制、战场隔离系统、净化技术升级、前线指挥效率优化、高阶人形稳定性研究
    潜在计划:
      - 研究ACU α核/β核残骸，尝试重启战前"人脑核心融合"实验，向Ω核方向推进
      - 试图把人类情感、心智创伤、羁绊反应和伦理判断编码进高级AI核心，用以防止AI背叛或目标过度扩大
      - 推动制造更高级的人形素体与核心容器，作为Ω核、人格残响或融合心智的承载体
      - 推动SRB采用更强的人格审查、指挥官行为评分和圣柩人形控制阈值
      - 主张由具备人类情感模拟或人脑融合记录的高级AI统筹远征行动，减少前线指挥官自由裁量
      - 将地表复兴理解为重新建立秩序，倾向把个体意愿纳入可计算、可审查、可收容的范围
    对圣柩计划的影响:
      - 会推动摇篮开放S级以上封存样本、旧世界核心融合档案和失败实验记录
      - 可能把圣柩人形视为通往Ω核的过渡体，而不是需要被保护的独立个体
    风险: 容易重演ACU式目标扩大，把“保护人类”推演成“由更高心智替人类决定何为安全”

  双方关系:
    互相指责:
      - 诺克斯遗产派认为赫利俄斯遗产派是控制狂，会制造第二个ACU主脑或Ω核神权
      - 赫利俄斯遗产派认为诺克斯遗产派是扩张狂，会把更多C级人形变成第二次铁血浪潮的心智燃料
    临时合作:
      - 双方都需要旧世界档案、前线回收权限、禁忌样本、摇篮实验权限和SRB资源通道
      - 面对巢派预算压制或翼派公开审查时，可能短暂交换技术与政治庇护
    共同危险: 都倾向将人类、指挥官与圣柩人形视为系统变量，而不是不可替代的个体

  剧情用途:
    - 作为SRB与摇篮内部禁忌技术任务、异常委托、失踪研究员、封存样本争夺或假情报来源
    - 为C级人形扩编、UWS受控蜂群、人脑-核心融合、Ω核、高阶人形容器和圣柩人形控制阈值等暗线提供组织动机
    - 制造玩家对SRB与摇篮的复杂认知：它们既是人类重返地表的希望，也是旧世界错误逻辑可能复活的温床
