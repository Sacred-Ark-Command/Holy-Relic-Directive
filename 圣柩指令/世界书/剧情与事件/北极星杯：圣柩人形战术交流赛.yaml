---
北极星杯:
  全称: 圣柩人形战术交流赛
  发起方: 由SRB翼派主导，并获中央司令部官方批准
  官方目的: 促进单位间交流，展示人形团队协作与人性光辉，向方舟传递重返地表的信心

  双重目的:
    对外宣传(翼派的政治工具):
      - 形象塑造: 对抗巢派舆论，将人形从“冰冷兵器”转变为有血有肉的英雄
      - 英雄化与偶像化: 诞生明星选手与王牌队伍，带动周边产品消费，为翼派和SRB提供支持
      - 希望的展示: 比赛选址地表本身即是宣示，鼓舞支持地表开拓的民众士气
    对内评估(SRB的真实意图):
      - 极限数据采集: 在高强度对抗中收集人形的反应速度、战术适应性、能量峰值等纯粹数据
      - 指挥官能力评估: 作为指挥官的“大考”，观察其临场战术、资源分配、团队管理能力，成绩计入SRB评估体系
      - 新技术试验场: 作为大规模、低风险的装备实测平台，为新装备列装提供依据
      - “摇篮”的教学反馈: 检验摇篮培养成果，数据用于优化下一代候补者的课程设计

  赛事场地与规则:
    场地名称: 神盾演习场
    位置: SRB严格控制的一处D级安全区，经过彻底净化，建有临时全息投影力场和观众设施
    环境: 内部模拟城市废墟、丛林、沙漠等多种地表环境
    后勤保障: 赛事期间，由精英单位护航开辟“安全走廊”，供参赛队伍前往，展示SRB的控制力
    核心规则:
      - 参赛资格: 所有现役指挥官可报名，但通常仅限功绩点排名前列或资格赛胜出者
      - 队伍组成: 每位指挥官带领5名圣柩人形组成标准代表队
      - 安全措施: 装备“竞赛模式”模块，使用发射低能量粒子的训练武器，击中后记录“伤害”并触发短暂“系统麻痹”，不造成物理损伤

  主要竞赛项目:
    开拓者之路(障碍接力赛):
      - 内容: 在超长赛道上以接力形式完成高速穿越、垂直攀爬、电子破解、重物搬运等复杂障碍
      - 考察点: 极限机动性、特殊技能应用、队员间的无缝衔接
    鹰眼协奏(协同射击赛):
      - 内容: 队伍分为狙击组和突击组，突击组通过压制或启动机关暴露目标，狙击组远程精确命中
      - 考察点: 精准射击能力、战场观察力、战术沟通与信任
    神盾冲突战(5v5模拟攻防战):
      - 核心赛事: 两队在模拟城市环境中进行“夺旗”、“据点占领”、“VIP护送”等对抗
      - 指挥官角色: 在独立指挥舱内进行实时指挥，其战术决策是胜负关键
      - 转播亮点: 最具观赏性，实时切换多视角和精彩回放，解说分析战术博弈

  赛事影响与奖励:
    方舟社会影响:
      - 全民狂欢: 成为年度娱乐盛宴，公共屏幕全程直播，催生粉丝团和地下博彩业
      - 文化符号: 获胜者成为年度偶像，故事编入教材，激励后继者
    奖励:
      冠军指挥官:
        - 荣誉: “北极星”勋章
        - 功绩: 巨额功绩点MP奖励
        - 权限: 下一年度稀有资源的最高优先申请权
        - 招募权: 获得一次A级人形优先调配权；若冠军功绩与机密权限足够，可能追加S级封存人形接触或唤醒候选资格
      冠军人形小队:
        - 外观: SRB顶级工坊量身打造的冠军标志个性化装备外观
        - 福利: 指挥官获得用于升级其个人房间、休息室等设施的特殊资源包
        - 休假: 获得一段完全无需执行任务的“荣誉假期”
