Pa粒子:
  基础设定:
    名称: 帕斯卡粒子。环境沉积态俗称“纳米尘”；高纯封装态为“PA燃料”
    本质与来源: 增强神经与机械同步的高能场媒介。因旧世界滥用失控滞留地表
    特性: 非阵营专属武器，非万能秒杀。低剂量提升同步效率；高剂量/失控沉积引发核心过载、神经毒性、协议噪声、接口侵蚀与电磁干扰
  作用与影响:
    生物: 人类长期暴露会导致重金属样中毒、畸变或死亡。耐污染动植物占据废墟
    普通机械: 堵塞散热，破坏未防护电路，致使远距通讯、雷达与制导不可靠
    网络机械: 失控环境干扰同步链路，开放节点越多污染扩散越快
  单位适应性:
    UWS: 吸收以提升巢群演化；过量会导致协议噪声、狂暴扩张与机体过热
    ACU: α核依赖高纯场维持智能活性；过量摄入加速其自我修正与开智
    圣柩人形: 增加精神负荷与维护消耗。D-S级必须使用PA燃料，无法直接吸收游离纳米尘；SS级可直接转化空气纳米尘为能量（受环境与稳定性限制）
    人类组织: SRB将其封装提炼利用；地表据点与地下方舟依赖高昂的隔离净化系统维持运作
  浓度等级:
    A级(红色警戒区): 呈半液态红色风暴。短时暴露致命，常规飞行器完全瘫痪
    B级(橙色污染区): 呈橙色雾霭。需全封闭循环氧气，飞行器坠毁风险极高
    C级(黄色缓和区): 呈腐蚀性沙尘。需过滤面罩，普通电子设备易失灵
    D级(绿色安全区): 接近可呼吸。仍有积尘风险，需定期检测设备与创口
  环境与战术限制:
    天气影响: 风暴加剧干扰与盲区；降雨压低空气浓度但污染水源与地表
    作战限制: 严禁超远程导弹、自动锁定与轨道火力，必须依赖陆行舰近距支援与目视接战
    飞行限制: 常规飞机极少使用；无人机等近地设备仅限低污染区短时、低空使用
    生存模式: 地表仅适合短时行动或陆行舰远征，长期定居维护成本极高
