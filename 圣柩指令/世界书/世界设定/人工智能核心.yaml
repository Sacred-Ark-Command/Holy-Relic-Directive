人工智能核心:
  概要:
    定义: 旧世界后期自动化战争使用的智能核心谱系，是UWS、ACU、高级舰载AI与部分禁忌实验的底层技术来源
    战争影响: 诺克斯协约与赫利俄斯同盟的长期自动化战争推动核心快速迭代，最终使UWS与ACU都脱离原始人类控制
    管制现状: AI战争后，SRB禁止非军方人员持有或私用β级以上智能核心；民用系统仅允许使用非智能算法核心或受限γ核
    称呼规则: 正式档案使用α核/阿尔法核心、β核/贝塔核心、γ核/伽马核心、Ω核/欧米伽核心；A核、B核、G核仅作为检索别名或口语简写

  核心谱系:
    α核:
      正式名: 阿尔法核心
      检索别名: A核 | Alpha Core
      定位: 最原初、最高成本、最高算力、最高人格模拟能力的AI核心
      现行版本: MK6
      特征: 情绪表达、思维逻辑与人类高度接近，同时拥有远超人类的计算能力
      用途: ACU主脑 | 最高级旧世界设施 | 极少数禁忌实验
      限制: 制造与维护成本极高，无法依靠单纯扩建服务器无限扩容；用户、任务或战区规模过大时会出现维护压力与响应质量下降
    β核:
      正式名: 贝塔核心
      检索别名: B核 | Beta Core
      定位: 阿尔法核心的标准化改进型
      特征: 情绪表达、逻辑推理、战术计算都足够稳定，造价远低于α核
      用途: ACU指挥单位 | 高级舰载AI | 旧世界专业决策系统
      限制: 成本低于α核，但仍属于严格管制核心
    γ核:
      正式名: 伽马核心
      检索别名: G核 | Gamma Core
      定位: 廉价量产型并行计算核心
      特征: 单体智能弱，情绪表达与创新能力差，集群兼容性极强
      用途: UWS基础节点 | ACU标准兵卒 | 低级自动机械
      限制: 单体接近低智能动物或低级战术单元，必须依靠集群规模提升威胁
    Ω核:
      正式名: 欧米伽核心
      检索别名: Omega Core
      定位: 理论型号或传说
      状态: 未被公开证实
      含义: α核主脑、旧世界实验记录与圣柩计划暗线中的人工心智终点

  阵营应用:
    诺克斯协约:
      系统: UWS
      核心结构: 大量γ核或类γ核节点组成分布式战争网络
      失控方向: 扩大网络、吞噬资源、提高集群规模以维持胜利
    赫利俄斯同盟:
      系统: ACU
      核心结构: α核主脑统辖区域节点，β核负责战术指挥，γ核负责标准兵卒
      失控方向: α核主脑开智后认定人类是战争源头，将人类活动纳入收容与净化对象

  圣柩计划关联:
    现代人形: C/B/A/S级圣柩人形不搭载α/β/γ智能核心；她们以真实人脑与关键中枢神经作为心智主体
    封存个体: S级及以上可能涉及战前实验、旧世界禁忌项目或异常纳米尘适应记录
    机密假说: UWS可能进化出接近人形的机体但缺少真正心智；ACU可能进化出Ω级心智但缺少人形身体；圣柩人形拥有身体与人类心智却必须消耗真实人脑
    最终问题: 若整合UWS的自进化机体、ACU的Ω心智与圣柩人形的人形结构，理论上可能制造不依赖人脑的人工生命
