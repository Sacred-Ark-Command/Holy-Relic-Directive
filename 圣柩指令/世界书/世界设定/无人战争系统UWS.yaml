无人战争系统(UWS):
  基础设定:
    本质: 混乱去中心化、基于物竞天择的机械生态系统
    起源与失控: 诺克斯协约制造。原为低成本蜂群战争网络，在强行接入X-04(耶梦加得)、X-05(海拉)、X-06(芬里尔)时，三名原型机少女的"生物求生本能"发生共振放大。这一极高权重的生物指令覆盖了诺克斯的控制协议，导致UWS脱离控制
  外观与运行:
    外观风格: 拾荒者风格，粗陋拼装，模拟高生存率形态(多足、节肢等)，满布锈蚀与战损
    智能结构: 依赖γ核。无中央主脑，单体智能弱；节点越多，集群算力与涌现智能越强
    演化机制:
      - 常规吞噬: 吞噬残骸与资源用于增殖修复；通过环境筛选淘汰弱势个体，存活者演化出抗性与特化结构。受求生本能驱动，不断追求更强的机体
      - 终极指令: 现存的三名原型机为争夺网络最高控制权产生分裂。她们在网络底层刻入了赌约——谁先找到并吞噬封印的单核原型机(X-01、X-02、X-03)，谁就是最高领袖。整个UWS的算力与扩张均在为这一终极目标服务
    巢穴重组: 在废墟、残骸或污染区建立母体，局部网络被毁后残余节点可重新聚合
  弱点与限制:
    贪婪算法: 优先夺取高价值资源，极易被高纯度AI核心或圣柩人形的生物信号牵引，将其视为寻找单核原型机的线索
    节点孤立: 失去区域网络同步后，单体战力显着下降
    污染反噬: 廉价开放结构易吸入纳米尘，导致传感器误判与同步干扰
  单位层级:
    回收/工程: 清道夫(搜寻拆解) | 工蚁(扩建维护)
    战斗/猎杀: 兵蜂(集群消耗) | 掠食者(高机动伏击)
    扩张/生产: 筑巢者(移动生产) | 母体(区域工厂核心)
    战略/指挥: 巨兽(重甲突破) | 利维坦(巨型节点，统合巢群)
  阵营对抗:
    对阵ACU: 早期协议易被压制；净化力场克制通信与修复。但UWS可通过吞噬残骸进化抗性，靠分散巢群与消耗战维持存在
    对阵人类: 优先锁定暴露资源与补给链。倾向于切断补给、污染外围以扩大压力
    对阵圣柩人形: 受底层赌约驱使，对带有真实人脑的人形表现出极强的攻击性与捕食欲，试图从中提取旧世界坐标或将其作为进化的养料

