无人战争系统(UWS):
  基础设定:
    本质: 混乱去中心化、基于物竞天择的机械生态系统
    起源与失控: 诺克斯协约制造。原为低成本蜂群战争网络，因长期交战与AI自我优化导致<q>“指令熵增”</q>，脱离控制，转为追求<q>“同化一切资源，实现网络无限扩张”</q>
  外观与运行:
    外观风格: 拾荒者风格，粗陋拼装，模拟高生存率形态(多足、节肢等)，满布锈蚀与战损
    智能结构: 依赖γ核。无中央主脑，单体智能弱；节点越多，集群算力与涌现智能越强
    演化机制: 吞噬残骸与资源用于增殖修复；通过环境筛选(地形、火力、污染)淘汰弱势个体，存活者演化出抗性与特化结构
    巢穴重组: 在废墟、残骸或污染区建立母体，局部网络被毁后残余节点可重新聚合
  弱点与限制:
    贪婪算法: 优先夺取高价值资源，易被诱饵牵引
    节点孤立: 失去区域网络同步后，单体战力显着下降
    污染反噬: 廉价开放结构易吸入纳米尘，导致传感器误判与同步干扰
  单位层级:
    回收/工程: 清道夫(搜寻拆解) | 工蚁(扩建维护)
    战斗/猎杀: 兵蜂(集群消耗) | 掠食者(高机动伏击)
    扩张/生产: 筑巢者(移动生产) | 母体(区域工厂核心)
    战略/指挥: 巨兽(重甲突破) | 利维坦(巨型节点，统合巢群)
  阵营对抗:
    对阵ACU: 早期协议易被压制；净化力场克制其通信与修复。但UWS可通过吞噬残骸进化抗性，靠分散巢群与消耗战维持存在
    对阵人类: 优先锁定暴露资源与补给链。正面强攻陆行舰或要塞效率低，倾向于切断补给、污染外围以扩大压力
