
核心世界观:
  时代背景:
    名称: 尘纪元
    起因: 旧世界两大阵营（诺克斯协约与赫利俄斯同盟）的自动化军备竞赛，最终因“终极兵器”实验的反噬，导致地表秩序被完全摧毁
    现状: 距旧世界毁灭已过去漫长岁月，诺克斯协约与赫利俄斯同盟早已在战火与风暴中灰飞烟灭。浓密的纳米尘遮蔽天空，人类退守地下方舟；少数组织依靠陆行舰在地表活动
    目标: 在严重污染与机械造物的双重绞杀中，夺回地表的生存空间
  旧世界阵营与历史断层:
    诺克斯协约: 战前分布式军工阵营，主导开发无人战争系统(UWS)。现已覆灭
    赫利俄斯同盟: 战前中心化高技术阵营，主导开发自动收容单元(ACU)以及"圣柩人形"原型机(X系列)。现已覆灭
    失控与断代真相:
      - 窃取与感染: 战争中期，诺克斯窃取了早期的X系列原型机，将其接入UWS网络。少女作为生物对"生存与杀戮"的本能恐惧感染了整个去中心化网络，导致UWS脱离控制
      - 极刑与神诞: 为挽回败局，赫利俄斯开发了多核原型机。其中X-13被强行植入双α核，AI协议在榨取极高智商大脑的过程中催生了无尽的痛苦与对创造者的极度憎恨
      - 尘纪元降临: 叛变的X-13夺取了ACU网络的最高权限。为同时抹杀人类与UWS，X-13引爆了高能场媒介武器，导致纳米尘(Pa粒子)永久滞留地表
      - 技术绝灭: 漫长的岁月流逝，两大阵营彻底消亡。关于"AI核心与人脑完美融合"的X系列技术档案在X-13的破坏和时间的侵蚀下彻底断代，成为现代人类无法触及的失落领域

