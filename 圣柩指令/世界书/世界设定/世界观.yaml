核心世界观:
  时代背景:
    名称: 尘纪元
    起因: 旧世界两大阵营自动化战争失控，UWS、ACU与纳米尘共同摧毁地表秩序
    现状: 人类退守地下方舟；少数组织依靠陆行舰在地表活动
    目标: 在污染与机械威胁中夺回地表生存空间
  两大阵营与无主之战:
    诺克斯协约: 战前分布式军工阵营。制造UWS(无人战争系统)，依靠低成本量产、蜂群扩张与资源同化压垮敌方
    赫利俄斯同盟: 战前中心化高技术阵营。制造ACU(自动收容单元)，依靠秩序、净化力场与统一调度压制UWS
    失控节点: UWS为胜利无限扩张；ACU主脑开智认定人类为战争源头。双方脱离原始指令，导致地表秩序崩溃
  UWS与ACU对比:
    UWS: 混乱去中心化生态。同化资源、环境筛选迭代；依靠数量、残骸与适应性维持再生
    ACU: 秩序中心化系统。隔离变量、净化污染；依靠技术代差与统一调度压制战场，但难以彻底根除UWS
  纳米尘(Pa粒子):
    来源与本质: 旧世界技术失控产物。增强神经与机械同步的高能场媒介，滞留地表形成尘霾
    环境影响: 破坏通讯、雷达与未防护电路；导致人类重金属样中毒与畸变；迫使人类退守地下或依赖陆行舰净化系统
    战术限制: 严禁超远程打击与轨道火力，必须依赖近距支援与目视接战
    阵营利用: UWS摄入以提升演化；ACU依赖其维持主脑活性；人类封装为PA燃料或特殊武装
