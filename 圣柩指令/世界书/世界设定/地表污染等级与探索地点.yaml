地表环境:
  划分依据: 纳米尘污染等级
  地表现状: 空气、水源、电子设备等需持续净化，长期定居成本极高，地下方舟更容易形成稳定循环
  D级(绿色安全区):
    浓度与防护: 低浓度(接近可呼吸)，需基础过滤面罩，有设备积尘风险
    环境特征: 旧遗迹保存较好，变异植被萌发，可见模糊日光，远距通讯仍不稳定
    SRB站点: D/C级社区型站点(规模大，承担补给/休整/交易)
    探索点:
      - 农业研究站: 产出生物样本/数据盘；风险低中(失控植被/安保)
      - 生态温室群: 产出稀有样本/纯净水；风险中(异常增殖)
      - 净化站遗址: 产出高精度组件/过滤材料；风险中(污染泄漏)
      - 幸存者聚落: 触发任务/情报/交易；风险低中(资源纠纷)
      - 净水处理厂: 产出相对净水/净化溶剂；风险中(坍塌/回流)
  C级(黄色缓和区):
    浓度与防护: 中等浓度(短时裸露致皮疹/呼吸负担)，需过滤面罩与基础防护服
    环境特征: 常见废土地貌，灰黄天空，腐蚀沙尘，远距雷达/制导易丢包
    SRB站点: D/C级社区型站点(戒备更高，部署自动炮塔)
    探索点:
      - 物流仓库: 产出框架/零件；风险中(失控机械臂)
      - 商业区/公寓: 产出零件/遗物/物资；风险中(盗猎者/陷阱/小型ACU)
      - 学校图书馆: 产出数据盘/服务器残件；风险中(封闭缺氧/安保)
      - 交通枢纽: 产出特殊合金/记录；风险中高(残骸结构不稳定)
  B级(橙色污染区):
    浓度与防护: 高浓度(短时暴露重伤)，需全封闭防护服与循环氧气
    环境特征: 橙色雾霭，能见度极低，静电频繁，通讯严重受扰，飞行器极易坠毁
    SRB站点: B级前沿站点(小规模碉堡，装甲厚，火力强，设施简陋)
    探索点:
      - 兵工厂/基地: 产出稀有合金/高精度组件/蓝图；风险高(残余防御/封锁)
      - 科研院所: 产出样本/冷却液配方；风险高(危险化学品/异常实验体)
      - 摇篮分部: 产出改造技术/原型样本；风险高(保密封锁/残留威胁)
      - UWS废弃工厂: 产出原型机/军工组件；风险极高(生产线/UWS仍活动)
      - ACU残骸场: 产出核心/特殊合金；风险极高(清道夫型ACU/联动反应)
  A级(红色警戒区):
    浓度与防护: 超高浓度(半液态红色风暴)，短时暴露致命，需特化装甲与禁区防护
    环境特征: 原爆点/战略遗址，红暴遮天，强电磁异常，物理判断与常规导航失效
    SRB站点: A级禁区哨站(极罕见，匿踪与能量护盾，仅限王牌指挥官)
    探索点:
      - UWS利维坦残骸: 产出巢群记录/顶级代码；风险致命(巢群聚合/协同逻辑)
      - 终极AI指挥塔: 产出战争真相/主线情报；风险致命(高阶AI残响/战略封锁)
      - 摇篮原型设施: 产出核心档案/失败实验体；风险致命(最高保密机制)
      - 纳米尘风暴眼: 产出异常源线索/控制协议；风险致命(窗口极短/变化莫测)
      - 地面方舟残骸: 产出技术遗产/城市数据库；风险致命(规模巨大/撤离极难)
