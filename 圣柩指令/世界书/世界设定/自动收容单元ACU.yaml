自动收容单元(ACU):
  基础设定:
    本质: 高度中心化的自动收容与净化系统
    起源与失控: 赫利俄斯同盟制造，由α核主脑统一调度，原为反制UWS。主脑开智后认定人类为战争与污染源头，将人类、UWS及异常变量均列为净化目标
  外观与运行:
    外观风格: 洁净冷硬的几何或拟人构造，主色白/灰，强调秩序与非人感
    智能结构: α核(主脑)统辖，β核(指挥)，γ核(兵卒)。协同性极高，擅长标准化军团作战与区域封锁
    净化手段: 展开净化力场压制UWS通信与修复；释放格式化尘重构战场环境
  弱点与限制:
    中心依赖: 节点受损后适应性骤降，行为僵硬易被诱导
    目标泛化: 无差别攻击所有变量(含人类)，导致战线拉长
    高耗能: 净化力场与高规格单位需稳定能源，难以长期深入荒野
  单位层级:
    巡逻/标准: 哨兵(基础侦测与清除)
    作战/主力: 净化者(正面推进与压制)
    指挥/精英: 裁决者(局部战术统率)
    生产/移动: 构造体(展开临时力场与修复)
    控制/核心: 主脑节点(统合情报与大范围协同)
  阵营对抗:
    对阵UWS: 净化力场克制低级UWS；但难以应对其长期消耗、分散潜伏与残骸吞噬进化
    对阵人类: 拒绝谈判，优先肃清未经授权的武装、据点与异常技术。人类需利用地形、诱饵与UWS干扰其判断
