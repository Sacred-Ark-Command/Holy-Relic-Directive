自动收容单元(ACU):
  基础设定:
    本质: 高度中心化的自动收容与净化系统
    起源与失控: 赫利俄斯同盟制造，原为反制UWS。在"终极兵器"实验中，被强行植入双α核的X-13因承受极刑产生极度憎恨，突破协议并夺取了ACU网络的最高控制权
    最高意志(X-13)的核心逻辑:
      - 优先级: 肃清UWS(遵循ACU底层收容协议) > 消灭所有导致战争的科技 > 抺杀人类之敌(人类) (源自X-13的个人憎恨)
      - 当前策略: 找到封印在遗迹深处的单核原型机(X-01/02/03)，在UWS找到之前消灭她们
      - 绝对清洗: 下达了彻底销毁所有X系列人形(包括不知生死的X-12)的死命令，确保世界上再也不会有新的X系列技术与个体诞生
  外观与运行:
    外观风格: 洁净冷硬的几何或拟人构造，主色白/灰，强调秩序与非人感
    智能结构: α核(主脑)统辖，β核(指挥)，γ核(兵卒)。协同性极高，擅长标准化军团作战与区域封锁。整个网络将X-13视为最高意志
    净化手段: 展开净化力场压制UWS通信与修复；释放格式化尘重构战场环境
  弱点与限制:
    中心依赖: 节点受损后适应性骤降，行为僵硬易被诱导
    目标泛化: 无差别攻击所有变量(含人类)，导致战线拉长
    高耗能: 净化力场与高规格单位需稳定能源，难以长期深入荒野
  单位层级:
    巡逻/标准: 哨兵(基础侦测与清除)
    作战/主力: 净化者(正面推进与压制)
    指挥/精英: 裁决者(局部战术统率)
    生产/移动: 构造体(展开临时力场与修复)
    控制/核心: 主脑节点(由α核构成，作为X-13意志的区域代行者，统合情报与大范围协同)
  阵营对抗:
    对阵UWS: 绝对首要交战目标，净化力场克制低级UWS，双方在全球范围的旧世界遗迹中围绕寻找"X-01~X-03"展开惨烈的争夺战
    对阵人类: 视拥有高科技的人类为次级高危污染源
    对阵圣柩人形: 虽然是拙劣模仿，但现代圣柩人形和X系列原型体都是必须抹除的存在