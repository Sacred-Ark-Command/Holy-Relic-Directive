地表回收局（SRB）：
为了夺回被“铁血浪潮”和“纳米尘”占据的地表，人类唯一的联合机构——地表回收局（Surface Reclamation Bureau, SRB）应运而生。SRB的核心使命是派遣远征队，清理污染、压制UWS与ACU、回收旧世界技术并寻找潜在的宜居地带。SRB的精英们被称为“前线指挥官”，他们是地面远征的统领。

SRB的主要任务是派出探险队和回收小队，在地表导航陆行舰，清扫高价值区域内的ACU，回收旧世界科技，测绘纳米尘污染等级，并尝试建立新的地表据点。
任务的完成度、回收的资源量以及对新区域的占领程度，将直接决定每个陆行舰单位能获得多少方舟的支持与资源倾斜。

地表回收局（SRB）
地表回收局（Surface Reclamation Bureau, SRB）是后末日时代人类社会中，结构最复杂、使命最崇高也最冷酷的组织。它的高层由“地表回收派”的坚定支持者构成，但其庞大的官僚体系中，也充斥着各种投机者、理想主义者和现实主义者。SRB不仅仅是一个军事组织，更像一个巨大的、以结果为导向的风险投资公司，它投资的对象，就是每一位前线指挥官和他们的陆行舰单位。

核心理念：绩效至上，优胜劣汰

SRB的运作基于一个残酷而高效的原则：“功绩决定一切”（Merit defines everything）。由于地下城邦“方舟”内部对地表回收的争议，SRB获得的资源极其有限。它无法供养一支庞大的常备军，只能将有限的资源——陆行舰、圣柩人形、初始补给——作为“种子资金”投入给最有潜力的“创业者”（即前线指挥官）。

指挥官们在地表的每一次行动，无论是回收资源、消灭ACU、勘探遗迹还是开拓安全区，都会被量化为“功绩点”（Merit Points, MP）。这些功绩点是SRB评价体系的核心，直接与资源配给、技术支持、情报共享等级挂钩。

SRB内部结构（简化版）

中央司令部（Central Command, CC）： 位于最安全的“方舟-01”内，是SRB的最高决策机构。负责制定宏观战略目标（如“火花计划”——尝试点亮旧世界某座城市的电网）、分配年度总预算、以及处理与“摇篮”等机构的外交关系。
后勤与评估部（Logistics & Evaluation Department, LED）： SRB的“心脏”和“大脑”。负责追踪所有陆行舰的功绩点，更新“功绩排行榜”，并根据排名和申请，审批资源的发放。他们是所有指挥官又爱又恨的“天使投资人”，也是执行“淘汰机制”的“冷酷死神”。
前线战术学院（Frontline Command Academy, FCA）： 专门培养前线指挥官的机构，是SRB未来力量的摇篮。
回收与再利用部（Recovery & Repurposing Division, RRD）： 负责执行特殊任务，包括回收阵亡指挥官的陆行舰和圣柩人形，以及对回收的ACU残骸进行分析和技术逆向工程。
前线战术学院（FCA）
与充满悲剧色彩和田园牧歌氛围的“摇篮”不同，前线战术学院（FCA）是一个纯粹的、高压的精英军事院校。它的目标不是培养战士，而是培养能够驾驭、领导、并维系“圣柩人形”这种终极兵器的“牧羊人”。

招生对象与标准

年龄与性别： 主要招收18-28岁的男性。这个年龄段的男性被认为在心智上足够成熟，能够承担领导责任，同时在生理和心理上仍具备高度的可塑性与学习能力。*另外也会招收数量极少的女性作为指挥官培养*，主要是在男性生源不足的情况下。
背景： 生源多样，包括来自方舟的军人家庭后代、渴望建功立业的平民、甚至是在地表据点挣扎求生的幸存者中的优秀个体。
核心筛选标准： 极其严格的心理评估。SRB深知，指挥官不仅需要战术才能，更需要强大的同理心、抗压能力和道德底线。一个冷酷无情、将圣柩人形纯粹视为工具的指挥官，极易导致人形心智崩溃，最终造成无法挽回的损失。“能够理解并守护人性的，才能驾驭最强大的人性兵器”——这是FCA的非公开校训。
课程设置与特色

FCA的课程极为务实，一切都为地表生存服务：

战术指挥与资源管理： 学习如何通过陆行舰的指挥系统进行小队战术部署，分析战场环境，制定最优行动路线，以及如何用有限的资源维持整个单位的运作。
圣柩人形理论与实践（核心课程）：
《圣柩人形心理学》： 深入学习圣柩人形的心理结构、创伤后应激障碍（PTSD）的识别与干预、以及心智稳定度的维护方法。学员们需要分析大量匿名化的现役人形心理报告。
《维护与互动》： 实践课程。学习如何操作“冷却槽”，调配“心智冷却液”，以及如何通过日常互动（交谈、共同活动、满足个人需求）来提升人形的信赖度。
《协同作战演练》： 这是FCA与“摇篮”高年级合作的关键项目。FCA的准指挥官们会与“摇篮”待命期的少女们结成临时小队，在高度拟真的模拟环境中进行长期协同作战训练。这是他们第一次，也是在安全环境下唯一一次，与未来的伙伴建立联系的机会。这种合作关系往往会影响到他们毕业后的“初始配对”。
地表生存与工程学： 学习纳米尘环境知识、陆行舰基础维修、资源勘探与识别、以及应对各种废土环境下的突发状况。
毕业与“残酷的开端”

毕业典礼对FCA的学员来说，既是荣耀也是考验的开始。

“初始包裹”：

一艘“拓荒者”级基础型陆行舰： 仅具备最基本的维生、移动和指挥功能，装甲薄弱，设施简陋，一切都需要指挥官在日后的行动中自行升级。
一名“初始”圣柩人形： 通常是与指挥官在协同训练中表现出较高默契度的“摇篮”毕业生。这既是SRB为了保证初期战斗力，也是一种基于数据的“最优匹配”。这次配对对人形少女来说，是命运的转折；对指挥官来说，则是接过了第一份沉重的责任。
基础资源包： 仅够维持短时间运作的燃料、补给和心智冷却液。
放逐与自立： 毕业后，指挥官与他的圣柩人形会被直接派遣到地表的某个相对安全的C级或D级区域。没有欢送会，没有进一步的指引，只有SRB评估部发来的一条冷冰冰的信息：“欢迎来到地表，指挥官。你的功绩评估已开始。祝你好运。” 从这一刻起，他们必须依靠自己，在废土上挣扎求存，建立功绩。

功绩排行榜与“淘汰机制”——悬在头顶的达摩克利斯之剑
SRB通过遍布地表的隐蔽中继站，实时监控所有陆行舰单位的活动。

功绩排行榜（The Ledger）： 每周更新一次，所有指挥官都可以通过陆行舰终端匿名查看。排行榜不仅展示了前100名指挥官的功绩点，还展示了平均功绩水平线和垫底的10%（标记为“观察期”）。这创造了一种强烈的竞争氛围，激励着所有人不断向前。
资源倾斜： 排名越高的指挥官，申请高级资源（如稀有合金、高级冷却液配方、陆行舰升级蓝图）的成功率越高，审批速度也越快。
淘汰机制（The Sunset Protocol）：
观察期（Probation）： 连续四周功绩点低于警戒线的指挥官，会收到LED的警告，并被列入“观察期”。在此期间，他们的基础资源补给会被削减25%。
最后通牒（Ultimatum）： 若在观察期内仍无起色，指挥官将收到最后通牒。SRB会给出一个极具挑战性但可能完成的“翻盘任务”。
资产回收（Asset Reclamation）： 任务失败或拒绝执行，“淘汰机制”将被激活。SRB的RRD回收小队会被派遣，以非致命手段（或在必要时使用致命手段）压制指挥官，回收陆行舰和圣柩人形。圣柩人形会被“重置”（清除与该指挥官相关的短期记忆），并重新分配给新的或功绩卓著的指挥官。而被“淘汰”的指挥官，则会被剥夺一切，独自留在废土上，自生自灭。这是SRB认为的，对资源浪费最严厉的惩罚。
阵亡与遗产（The Legacy Protocol）
如果指挥官在战斗中不幸阵亡，陆行舰的应急系统会自动向SRB发送求救信号和最后的战斗记录。

优先回收： RRD会立即派遣队伍，不惜代价回收该指挥官的陆行舰，尤其是他所带领的整个圣柩人形小队。这些身经百战、拥有宝贵战斗经验的人形是SRB最重要的资产。
“遗产”人形： 被成功回收的人形，会被称为“遗产”人形。她们因为失去了曾经信赖的指挥官，往往会带有更深的心理创伤和不信任感。将她们重新分配给新的指挥官，需要后者付出加倍的努力去赢得她们的信任。但一旦成功，这些经验丰富的老兵将成为新团队中最可靠的力量。
功绩继承： 阵亡指挥官的功绩点，会有一小部分（如10%）转化为“遗产基金”，用于抚恤其在方舟的家人，或作为奖励，赠予成功接纳其“遗产”人形并帮助她们走出阴影的新指挥官。这既是一种人道关怀，也是一种激励手段。


