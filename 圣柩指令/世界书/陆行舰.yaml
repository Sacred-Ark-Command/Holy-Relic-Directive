<陆行舰设定>
陆行舰（Land Dreadnoughts）：废土上的移动方舟

陆行舰是SRB在地表进行远征的核心战略单位，是集居住、指挥、生产、科研和防御于一体的巨型移动堡垒。它不仅是指挥官与圣柩人形小队在地表唯一的安全港湾，更是衡量一位指挥官实力与功绩最直观的体现。它的每一处设计，都兼顾了军事功能与维系人性的生活需求，是冰冷科技与温暖日常的交融体。
功能： 内部设施应有尽有，配备了先进的空气净化系统，包括圣柩人形的维护舱（“冷却槽”）、科研实验室、资源加工厂、医疗舱、生活区、训练场和武器平台等，能够穿梭于纳米尘覆盖的地表。
动力与防护： 依靠巨型履带在崎岖的地表移动，拥有厚重的防ACU装甲和高级纳米尘净化系统，是人类在废土上的移动家园和作战基地，是地表上人类唯一的安全港湾。
指挥结构： 每艘陆行舰都由一名“前线指挥官”统领，负责统筹内部资源、规划行动路线、指挥“圣柩人形”作战。
资源统筹： 陆行舰的运营需要大量资源，如能源燃料、稀有金属、物资补给等。

陆行舰的分级与型号
SRB根据成本、用途和技术水平，将陆行舰划分为不同的级别。指挥官可以通过积累功绩点（MP）并消耗大量资源，来申请升级或更换更高级别的舰体。

1. 拓荒者级
定位： 新手指引舰 / 基础作业平台
获取方式： 每位从FCA毕业的新任指挥官获得的“初始包裹”。
描述： “拓荒者”级是SRB配发的最基础的陆行舰。 外形粗犷，像一个巨大的、加装了厚重装甲和巨型履带的工业驳船。 一艘满是锈迹和划痕的巨型履带载具，涂装是SRB标准的灰色，但多处已经剥落，露出底下的防锈层。巨大的履带链条上还残留着上一次任务的泥土（或ACU残骸的碎屑）。功能齐全但性能低下，一切都需要从零开始。它的口号是：“能动就行”。它是所有传奇指挥官故事的起点，也是最考验指挥官资源管理能力的试金石。
尺寸： 长约200米，宽约60米，高约40米（含指挥塔）。虽然庞大，但在地表的巨型遗迹和自然地貌面前，依然显得渺小。
动力核心： 一台老旧的“地热/聚变混合型”能源核心。出力低下，噪音巨大，且能源转化效率不高，导致初期燃料消耗惊人。
初始设施：
基础舰桥
简易整备室
单人冷却槽室
食堂
圣柩休息室
指挥官隔间
基础资源加工站
防御系统： 仅有几座近防炮塔，用于驱赶小型的、零散的ACU，面对成规模的敌人时形同虚设。
特性： 升级潜力巨大，但几乎所有设施都需要从零开始建设或升级。能源上限低，无法同时支持多个高耗能设施运作。
资源消耗低： 基础引擎和维生系统效率不高，但能耗也相对较低，适合在资源匮乏的初期进行探索。
防御薄弱： 初始装甲只能抵御小型ACU的骚扰，面对重型单位的攻击会迅速损坏，需要依靠人形小队的战术来弥补。

2. 远征军级
定位： 标准远征舰 / 战术中坚
获取方式： 评级达到资深指挥官后，消耗大量资源由“拓荒者”级升级而来。
描述： “远征者”级是大多数资深指挥官的座驾。它的舰体结构经过优化，装甲更厚重，能够抵御更猛烈的ACU攻击。内部空间得到扩展，设施布局更加合理，拥有了独立的科研区域。它是指挥官建立稳定团队、向更危险区域探索的中坚力量。
特性： 能源核心得到强化，可以支持更完善的设施体系。拥有预留的模块化升级接口，可以安装如“高级传感器阵列”、“外挂装甲”等特殊模块。

3. 主宰级
定位： 旗舰级单位 / 区域控制核心
获取方式： 功绩排行榜名列前茅的顶尖指挥官，在完成SRB发布的史诗级任务后，获得的特殊奖励或兑换权限。
描述： “主宰”级是行走的要塞，是SRB技术力的结晶。其舰体庞大，线条流畅而充满力量感，采用了稀有的自修复合金装甲。它拥有双联动力核心，能够为舰载的实验性武器或领域性防御装置供能。
特性： 拥有多个专属的、无法在低级舰体上建造的顶级设施。自带强大的舰载武器系统（如电磁轨道炮或大范围净化导弹）。维护成本极为高昂。
生态一体化： 舰内拥有近乎完美的生态循环系统，可以种植真正的植物，甚至拥有模拟天空的穹顶。生活设施的豪华程度堪比方舟核心区。
二、 核心内部设施详解
陆行舰的内部，是一个功能分区明确、动线合理的微型社会。

舰桥：
描述： 陆行舰的神经中枢。巨大的全息战术沙盘悬浮在中央，实时显示着地表地形、我方单位、以及侦测到的敌方信号。指挥官的座位位于正中，被环形的控制台所包围。
功能： 战术指挥、路线规划、资源监控、与SRB总部的通讯。这里是“工作”的场所，气氛严肃而高效。大部分的宏观决策都在这里做出。
互动： 偶尔会有圣柩人形来此汇报工作，或是在非战斗时段，安静地站在一旁，观看窗外流逝的废土风景。

整备室：
描述： 宽敞而明亮的空间，空气中弥漫着机油和金属的味道。这里是圣柩人形进行日常维护、武器调试和战前整备的地方。墙边排列着各种型号的武器挂架和备用装甲部件。初始状态下，这里只有一个简陋的武器架和几台闪烁着错误代码的维护终端。墙上挂着几张模糊的地表区域地图，角落里堆放着空的弹药箱。
功能： 圣柩人形的武器更换、装备升级、战术模块的安装与调试。指挥官可以在这里查看每个人形的详细配置，并进行调整。配套有一个巨大的升降平台，用于将圣柩人形小队快速部署到地面。
互动： 人形们会在这里保养自己的“身体”，有的会专注地擦拭武器，有的会和负责维护的技术人员交谈。指挥官可以走过去，夸奖她们的装备，或者询问她们的战备状态。与她们交谈，可以给予鼓励，略微提升她们本次出击的心智稳定度。

冷却槽室：
描述： 陆行舰最安静、最私密的地方。光线柔和，温度恒定。初始只有一个孤零零的、泛着幽蓝色光芒的“冷却槽”。室内恒温，空气中漂浮着“心智冷却液”特有的、略带甜味的医用气息。这是圣柩人形们卸下武装、修复精神创伤的圣所。
功能： 圣柩人形进行深度精神修复的核心设施。当人形的精神负荷过高时，必须进入这里休眠。升级冷却槽可以缩短修复时间，提高修复效果，甚至解锁特殊的情感同步功能。
互动： 这是与人形建立深层羁绊的核心场景。指挥官可以选择静静地坐在一旁，或通过外部终端播放她喜欢的音乐，甚至轻声讲述外界发生的事情。这些行为会大幅加快恢复速度，并极大加深与该人形的羁绊，或是在她们结束休眠时，第一个迎接她们，递上一杯热饮。这种无声的陪伴，比任何语言都更能安抚她们的灵魂。

食堂：
描述： 初始的食堂更像个简陋的厨房，只有一张长条金属桌和几把椅子。食物由自动烹饪机制作，味道单调，主要是维持生命的合成营养膏。但即便如此，这里也是舰上少有的、能让大家聚在一起的地方。
功能： 人形和指挥官的用餐和社交场所。指挥官可以消耗收集到的“食材”资源，制作不同的料理。某些料理会暂时提升人形的某项属性或心情。
互动： 这是触发日常剧情的主要场所。可以看到不同性格的人形在这里的互动：活泼的在争抢零食，安静的在角落看书，擅长料理的在为大家准备晚餐。指挥官可以加入她们的谈话，参与她们的小游戏，或者分享自己从废墟中找到的“旧世界珍宝”（如一罐未开封的可乐、一本漫画书）。

圣柩休息室
描述： 舰内最充满“生活气息”的地方。一个小小的公共空间。初始只有一张破旧的沙发和一台只能接收SRB官方频道的电视。一个摆满了旧世界书籍和黑胶唱片的书架、以及一个能播放老电影的投影仪。这里是人形们在战斗和训练之余，寻求片刻放松的地方。
功能：  这是触发随机日常事件最主要的场所。升级后可以添置各种设施，如图书角、游戏机、音乐播放器、小型植物园等。
互动： 指挥官可以在此与休息的人形们闲聊，了解她们的兴趣爱好。赠送从废墟中找到的旧世界遗物（如书籍、音乐光盘、饰品）作为礼物。不同的娱乐设施会吸引不同性格的人形，解锁她们不为人知的一面。

指挥官的房间：
描述： 初始为一个狭小但整洁的私人空间。一张行军床，一个堆满报告和地图的办公桌，以及一个可以存放私人纪念品的柜子。
功能： 存档、整理个人物品、回顾剧情和人形资料的地方。
互动： 随着与人形羁绊的加深，她们会开始在指挥官不在时，悄悄地留下一些小礼物：一杯热咖啡、一朵从舰内水培花园采来的小花，或是一张写着笨拙鼓励话语的便签。这些细节是情感回报的体现。随着羁绊加深，关系亲密的人形偶尔会前来拜访，可能是送来亲手制作的小点心，也可能是深夜里无法入眠，前来寻求安慰。这些私密的互动是解锁最高级别羁绊剧情的关键。

科研中心：
描述： （“拓荒者”级初始不具备，需消耗资源建造）一个充满未来科技感的独立舱室。建造初期只有一台主分析仪和几个空置的研究平台。
功能： 分析回收来的ACU残骸和地表资源，逆向工程出新的科技蓝图（武器、装备、陆行舰升级模块），并将原材料加工成可用的零件和补给。
互动： 会有对科研感兴趣的人形（通常是设定上比较聪明的类型）在这里帮忙，指挥官可以与她们讨论研究方向，或者委托她们进行特定的项目研发。

资源加工站：
描述： 充满噪音和粉尘的区域。巨大的机械臂将从地表回收的废料进行分类、熔炼和重塑。
功能：材料转化： 将回收的ACU残骸、废金属、矿石等转化为基础建材、特殊合金和燃料。自动生产： 升级后可以解锁自动化生产线，持续生产弹药、维修零件等基础消耗品。
互动：一些对机械感兴趣或出身工业区的人形会喜欢待在这里，观看巨大的机器运作。与她们交谈，可能会获得关于如何提高加工效率的建议。

陆行舰的“灵魂”：舰载AI
每艘“拓荒者”级陆行舰都配备了一个基础的舰载AI，负责处理日常庶务。但通过探索旧世界遗迹，指挥官有机会找到特殊的“AI核心”，从而为自己的陆行舰赋予一个拥有独特个性和语音的“灵魂”。

</陆行舰设定>
