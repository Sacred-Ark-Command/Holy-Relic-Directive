              function createExpandableItemSection(title, sectionData, itemPathPrefix, statusGrid, insertBeforeElement = null) {
                // Do not render if data is missing or empty (ignoring meta)
                if (!sectionData || typeof sectionData !== 'object' || Object.keys(sectionData).filter(k => k !== '$meta' && SafeGetValue(sectionData[k], '名称', '') !== '').length === 0) {
                    return;
                }

                const sectionEl = document.createElement('div');
                sectionEl.className = 'section dynamic-ship-section';
                sectionEl.innerHTML = `
                    <div class="section-header clickable" onclick="toggleSection(this)">${title}</div>
                    <div class="section-content" style="display: none; gap: 10px;"></div>
                `;
                const contentEl = sectionEl.querySelector('.section-content');

                for (const itemKey in sectionData) {
                    if (!sectionData.hasOwnProperty(itemKey) || itemKey === '$meta') continue;

                    const item = sectionData[itemKey];
                    const itemName = SafeGetValue(item, '名称', '');
                    // Skip empty/placeholder items
                    if (itemName === '') continue;

                    const itemStatus = SafeGetValue(item, '状态', '未知');

                    const itemEl = document.createElement('div');
                    itemEl.className = 'property';
                    itemEl.style.cursor = 'pointer';
                    const itemPath = `${itemPathPrefix}.${itemKey}`;
                    itemEl.setAttribute('onclick', `toggleItemDescription(this, '${itemPath}')`);
                    itemEl.innerHTML = `
                        <div class="property-name" style="text-transform: none;">${itemName}</div>
                        <div class="property-value-container">
                            <span class="value-main" style="font-size: 1em; color: ${itemStatus === '良好' ? 'var(--accent-bond)' : 'var(--accent-warning)'};">${itemStatus}</span>
                        </div>
                        <div class="item-description"></div>
                    `;
                    contentEl.appendChild(itemEl);
                }
                
                // Only append the section if it has actual items to show
                if (contentEl.children.length > 0) {
                    if (insertBeforeElement) {
                        statusGrid.insertBefore(sectionEl, insertBeforeElement);
                    } else {
                        statusGrid.appendChild(sectionEl);
                    }
                }
              }

              function renderDollList(dollList) {
                const dollContentWrapper = document.getElementById('doll-list-content');
                dollContentWrapper.innerHTML = ''; // Clear previous content

                // Create and append sort controls
                const sortControls = document.createElement('div');
                sortControls.className = 'sort-controls';
                sortControls.innerHTML = `
                    <button class="sort-btn" onclick="sortDolls('rarity', event)">稀有度</button>
                    <button class="sort-btn" onclick="sortDolls('combat', event)">战力</button>
                    <button class="sort-btn" onclick="sortDolls('bond', event)">羁绊</button>
                `;
                dollContentWrapper.appendChild(sortControls);

                // Set active class on the correct button
                const activeSortBtn = sortControls.querySelector(`button[onclick^="sortDolls('${currentSort.key}'"]`);
                if(activeSortBtn) {
                    activeSortBtn.classList.add('active');
                }

                if (Array.isArray(dollList)) {
                    dollList.forEach(dollData => {
                      if (typeof dollData !== 'object' || dollData === null) return; // Skip meta strings etc.
                      const dollName = SafeGetValue(dollData, '代号', null);
                      if (!dollName) return;

                      const dollElement = document.createElement('div');
                      dollElement.innerHTML = createDollSection(dollData, dollName);
                      // Append each part of the doll section (header and content)
                      while(dollElement.firstChild) {
                        dollContentWrapper.appendChild(dollElement.firstChild);
                      }

                      // Now update the progress bars for this specific doll
                      const dollStrainStages = [
                        { min: 0, max: 19, name: '状态良好' },
                        { min: 20, max: 39, name: '轻度疲劳' },
                        { min: 40, max: 69, name: '中度承压' },
                        { min: 70, max: 89, name: '重度过载' },
                        { min: 90, max: 100, name: '崩溃边缘' },
                      ];
                      updateProgressBar(
                        `doll-${dollName}-strain-bar`,
                        `doll-${dollName}-strain`,
                        `doll-${dollName}-strain-desc`,
                        SafeGetValue(dollData, '精神负荷', 0),
                        0,
                        100,
                        dollStrainStages,
                      );

                      const dollBondStages = [
                        { min: 0, max: 199, name: '公式化应对' },
                        { min: 200, max: 399, name: '谨慎观察' },
                        { min: 400, max: 699, name: '可靠战友' },
                        { min: 700, max: 899, name: '私下信赖' },
                        { min: 900, max: 1000, name: '灵魂共鸣' },
                      ];
                      updateProgressBar(
                        `doll-${dollName}-bond-bar`,
                        `doll-${dollName}-bond`,
                        `doll-${dollName}-bond-desc`,
                        SafeGetValue(dollData, '羁绊深度', 0),
                        0,
                        10000,
                        dollBondStages,
                      );
                    });
                }
              }

              function sortDolls(key, event) {
                event.stopPropagation(); // Prevent the section from toggling

                if (currentSort.key === key) {
                    currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
                } else {
                    currentSort.key = key;
                    currentSort.direction = 'desc'; // Default to descending for new sort key
                }

                let dollList = GetRawValue(statDataCache, '人形列表.圣柩人形', []);
                if (!Array.isArray(dollList)) return;

                const rarityOrder = { 'C': 0, 'B': 1, 'A': 2, 'S': 3, 'SS': 4, 'SSS': 5 };

                dollList.sort((a, b) => {
                    let valA, valB;
                    switch (key) {
                        case 'rarity':
                            valA = rarityOrder[SafeGetValue(a, '稀有度', 'C')] || 0;
                            valB = rarityOrder[SafeGetValue(b, '稀有度', 'C')] || 0;
                            break;
                        case 'combat':
                            valA = parseInt(SafeGetValue(a, '人形战力', '0'), 10);
                            valB = parseInt(SafeGetValue(b, '人形战力', '0'), 10);
                            break;
                        case 'bond':
                            valA = parseInt(SafeGetValue(a, '羁绊深度', '0'), 10);
                            valB = parseInt(SafeGetValue(b, '羁绊深度', '0'), 10);
                            break;
                        default:
                            return 0;
                    }

                    if (currentSort.direction === 'asc') {
                        return valA - valB;
                    } else {
                        return valB - valA;
                    }
                });

                renderDollList(dollList);
              }

              function renderMissions() {
                const missionListContainer = document.getElementById('mission-list');
                missionListContainer.innerHTML = '';

                const filteredMissions = missionCache.filter(mission => {
                    if (currentMissionFilter === 'all') return true;
                    return SafeGetValue(mission, '任务类型', '') === currentMissionFilter;
                });

                if (filteredMissions.length === 0) {
                    missionListContainer.innerHTML = `
                      <div class="property">
                          <div class="property-value-container" style="justify-content: flex-start; grid-column: 1 / -1;">
                              <span class="value-main">无</span>
                          </div>
                      </div>`;
                    return;
                }

                filteredMissions.forEach(missionData => {
                    const missionName = SafeGetValue(missionData, '任务名', '');
                    const missionLevel = SafeGetValue(missionData, '任务等级', '');
                    const missionObjective = SafeGetValue(missionData, '任务目标', '');
                    const missionReward = SafeGetValue(missionData, '任务奖励', '');
                    const missionType = SafeGetValue(missionData, '任务类型', '');

                    const missionElement = document.createElement('div');
                    missionElement.classList.add('property');
                    missionElement.style.cssText =
                      "grid-template-columns: 1fr; grid-template-areas: 'name' 'value'; gap: 8px; border-top: 1px solid var(--border-color); padding-top: 10px;";
                    
                    const typeColor = missionType === '主线' ? 'var(--accent-danger)' : 'var(--accent-bond)';

                    missionElement.innerHTML = `
                      <div class="property-name" style="grid-area: name; font-size: var(--font-size-lg); color: var(--text-header);">
                        ${missionName} <span style="color: ${typeColor};">[${missionType}]</span> <span style="color: var(--accent-warning);">[${missionLevel}]</span>
                      </div>
