                  }
              };

              function openUpgradeModal() {
                if (!statDataCache) return;
                const modal = document.getElementById('upgrade-modal');
                const currentResources = GetRawValue(statDataCache, '陆行舰.舰内资源', {});

                // Populate resources
                const resourceList = document.getElementById('upgrade-resource-list');
                resourceList.innerHTML = '';
                for (const resourceName in currentResources) {
                    if (!currentResources.hasOwnProperty(resourceName) || resourceName === '$meta') continue;
                    const value = SafeGetValue(currentResources, resourceName, '0');
                    resourceList.innerHTML += `<div>${resourceName}: <span style="color: var(--text-primary);">${value}</span></div>`;
                }

                // Populate facilities
                const facilityList = document.getElementById('upgrade-facility-list');
                const facilities = GetRawValue(statDataCache, '陆行舰.舰内设施', {});
                const shipLevelName = SafeGetValue(statDataCache, '陆行舰.陆行舰等级', '拓荒者级');
                const maxLevel = SafeGetValue(statDataCache, `陆行舰.陆行舰等级数据.${shipLevelName}.设施等级上限`, 3);
                facilityList.innerHTML = '';

                for (const facilityName in facilities) {
                    if (!facilities.hasOwnProperty(facilityName) || facilityName === '$meta') continue;
                    
                    const level = parseInt(SafeGetValue(facilities[facilityName], '等级', '1'), 10);
                    const nextLevel = level + 1;

                    const row = document.createElement('div');
                    row.className = 'upgrade-facility-row';

                    let levelText;
                    if (level >= maxLevel) {
                        levelText = `<span style="color: var(--accent-bond);">Lv.${level} (MAX)</span>`;
                    } else {
                        row.classList.add('clickable');
                        row.onclick = () => showUpgradeConfirmation(facilityName, level);
                        levelText = `Lv.${level} &rarr; Lv.${nextLevel}`;
                    }

                    row.innerHTML = `
                        <div class="facility-info">
                            <div class="facility-info-name">${facilityName}</div>
                        </div>
                        <div class="facility-info-level">${levelText}</div>
                    `;
                    facilityList.appendChild(row);
                }

                document.getElementById('upgrade-confirmation-dialog').style.display = 'none';
                modal.style.display = 'block';
              }

              function showUpgradeConfirmation(facilityName, currentLevel) {
                const dialog = document.getElementById('upgrade-confirmation-dialog');
                const text = document.getElementById('upgrade-confirmation-text');
                const costList = document.getElementById('upgrade-cost-list');
                const warning = document.getElementById('upgrade-resource-warning');
                const confirmBtn = document.getElementById('upgrade-confirm-execute-btn');
                
                const nextLevel = currentLevel + 1;
                text.innerText = `确定要将 ${facilityName} 升级到 Lv.${nextLevel} 吗?`;
                
                const costs = upgradeCosts[facilityName]?.[nextLevel];
                if (!costs) {
                    costList.innerHTML = '<span>无法获取升级成本信息。</span>';
                    confirmBtn.disabled = true;
                    dialog.style.display = 'block';
                    return;
                }

                const currentResources = GetRawValue(statDataCache, '陆行舰.舰内资源', {});
                let hasEnoughResources = true;
                let costHtml = '<strong style="margin-bottom: 5px; display: block;">资源消耗:</strong>';
                costList.style.display = 'grid';
                costList.style.gridTemplateColumns = '1fr 1fr';
                costList.style.gap = '5px 10px';


                for (const resource in costs) {
                    const required = costs[resource];
                    const current = parseInt(SafeGetValue(currentResources, resource, '0'), 10);
                    const color = current >= required ? 'var(--text-primary)' : 'var(--accent-danger)';
                    costHtml += `<div class="upgrade-cost" style="color: ${color};">${resource}: ${required} (拥有: ${current})</div>`;
                    if (current < required) {
                        hasEnoughResources = false;
                    }
                }
                costList.innerHTML = costHtml;

                if (hasEnoughResources) {
                    warning.innerText = '';
                    confirmBtn.disabled = false;
                } else {
                    warning.innerText = '资源不足!';
                    confirmBtn.disabled = true;
                }

                confirmBtn.onclick = () => executeUpgrade(facilityName, nextLevel, costs);
                
                // Hide the main facility list and show the confirmation dialog
                document.getElementById('upgrade-facility-list').style.display = 'none';
                dialog.style.display = 'block';
              }

              function hideUpgradeConfirmation() {
                document.getElementById('upgrade-facility-list').style.display = 'block';
                document.getElementById('upgrade-confirmation-dialog').style.display = 'none';
              }

              function executeUpgrade(facilityName, newLevel, costs) {
                const costParts = [];
                for (const resource in costs) {
                    if (costs.hasOwnProperty(resource)) {
                        costParts.push(`${costs[resource]}数量的${resource}`);
                    }
                }
                
                const costString = costParts.join('，');
                const narrative = `使用了${costString}，将${facilityName}升级到Lv${newLevel}`;
                const commandToSend = `/send ${narrative}|/trigger`;

                if (typeof triggerSlash === 'function') {
                    triggerSlash(commandToSend);
                    // Close modal and refresh display
                    closeUpgradeModal();
                    setTimeout(initDisplay, 500); // Give a moment for data to update
                } else {
                    console.error('triggerSlash function is not available.');
                    alert('无法执行升级操作。');
                }
              }

              function openAiQueryModal() {
                const modal = document.getElementById('ai-query-modal');
                const queryList = document.getElementById('ai-query-list');
                if (!modal) return;

                const questions = [
                    "什么是MSP供应协议",
                    "怎么获取人形",
                    "什么是“遗产”人形",
                    "SRB是什么",
                    "什么是ACU",
                    "什么是UWS",
                    "陆行舰的介绍",
                    "如何升级陆行舰",
                    "‘摇篮’介绍",
                    "地下方舟介绍",
                    "如何更换舰载AI"
                ];

                queryList.innerHTML = ''; // Clear previous list
                questions.forEach(q => {
                    const item = document.createElement('div');
                    item.className = 'query-item';
                    item.textContent = q;
                    item.onclick = () => {
                        const commandToSend = `/send 问问舰载AI，“${q}”|/trigger`;
                        if (typeof triggerSlash === 'function') {
                            triggerSlash(commandToSend);
                            closeAiQueryModal();
                        } else {
                            console.error('triggerSlash function is not available.');
                            alert('无法执行操作。');
                        }
                    };
                    queryList.appendChild(item);
                });

                modal.style.display = 'block';
              }

              function closeAiQueryModal() {
                  const modal = document.getElementById('ai-query-modal');
                  if (modal) {
                      modal.style.display = 'none';
                  }
              }

              function closeUpgradeModal() {
                const modal = document.getElementById('upgrade-modal');
                if (modal) {
                    modal.style.display = 'none';
                }
                // Also reset the view inside
                const facilityList = document.getElementById('upgrade-facility-list');
                if (facilityList) {
                    facilityList.style.display = 'block';
                }
                const confirmationDialog = document.getElementById('upgrade-confirmation-dialog');
                if (confirmationDialog) {
                    confirmationDialog.style.display = 'none';
                }
              }

              function toggleFacilityDescription(element, facilityName) {
                const descriptionDiv = element.querySelector('.facility-description');
                if (!descriptionDiv || !statDataCache) return;

                // If description is empty, populate it
                if (descriptionDiv.innerHTML === '') {
                  const description = SafeGetValue(statDataCache, `陆行舰.舰内设施.${facilityName}.描述`, '没有找到相关描述。');
                  descriptionDiv.innerText = description;
                }

                // Toggle display
                const isVisible = descriptionDiv.style.display === 'block';
                descriptionDiv.style.display = isVisible ? 'none' : 'block';
              }

              function toggleDollDetails(headerElement) {
                const content = headerElement.nextElementSibling;
                if (content) {
                  const isVisible = content.style.display === 'block';
                  content.style.display = isVisible ? 'none' : 'block';
                }
              }

              function toggleItemDescription(element, itemPath) {
                const descriptionDiv = element.querySelector('.item-description');
                if (!descriptionDiv || !statDataCache) return;

                // If description is empty, populate it
                if (descriptionDiv.innerHTML === '') {
                  const description = SafeGetValue(statDataCache, `${itemPath}.描述`, '没有找到相关描述。');
                  descriptionDiv.innerText = description;
                }

                // Toggle display
                const isVisible = descriptionDiv.style.display === 'block';
                descriptionDiv.style.display = isVisible ? 'none' : 'block';
              }

