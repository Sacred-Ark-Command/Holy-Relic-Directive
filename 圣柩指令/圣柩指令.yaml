                    customInput.style.display = 'block';
                  } else {
                    customInput.style.display = 'none';
                  }
                });
              }

              document.getElementById('commander-origin').addEventListener('change', updateOriginDescription);
              setupCustomInput('ai-style', 'ai-style-custom');
              document.getElementById('ai-style').addEventListener('change', updateAiName);

              document.getElementById('randomize-button').addEventListener('click', () => {
                // Randomize origin first, which will set the driving force
                const originSelect = document.getElementById('commander-origin');
                const maxOriginIndex = originSelect.options.length - 2; // Exclude custom
                originSelect.selectedIndex = Math.floor(Math.random() * (maxOriginIndex + 1));
                originSelect.dispatchEvent(new Event('change')); // This will update description and driving force

                // Randomize other selects
                const otherSelects = ['personality', 'combat-style', 'ai-style'];
                otherSelects.forEach(id => {
                  const select = document.getElementById(id);
                  const maxIndex =
                    select.options[select.options.length - 1].value === 'custom'
                      ? select.options.length - 2
                      : select.options.length - 1;
                  select.selectedIndex = Math.floor(Math.random() * (maxIndex + 1));
                  select.dispatchEvent(new Event('change'));
                });
                generateStats();
              });

              document.getElementById('send-button').addEventListener('click', async () => {
                const sendButton = document.getElementById('send-button');

                function getCustomValue(selectId, inputId, name) {
                  const select = document.getElementById(selectId);
                  let value = select.value;
                  if (value === 'custom') {
                    value = document.getElementById(inputId).value;
                    if (!value) {
                      alert(`请输入您的自定义${name}！`);
                      return null;
                    }
                  }
                  return value;
                }

                const commanderCodename = document.getElementById('commander-codename').value;
                const commanderGender = document.querySelector('input[name="gender"]:checked').value;
                const commanderOrigin = getCustomValue('commander-origin', 'commander-origin-custom', '出身');
                if (!commanderOrigin) return;

                const landshipName = document.getElementById('landship-name').value;
                const personality = document.getElementById('personality').value;
                const combatStyle = document.getElementById('combat-style').value;

                let aiStyle = getCustomValue('ai-style', 'ai-style-custom', 'AI风格');
                if (!aiStyle) return;

                const selectedAiStyleKey = document.getElementById('ai-style').value;
                const aiName = aiNameData[selectedAiStyleKey] || '自定义';

                const rarity = document.getElementById('rarity-val').textContent;
                const stat1 = document.getElementById('stat1-val').textContent;
                const stat2 = document.getElementById('stat2-val').textContent;
                const stat3 = document.getElementById('stat3-val').textContent;
                const stat4 = document.getElementById('stat4-val').textContent;
                const stat5 = document.getElementById('stat5-val').textContent;

                if (rarity === '--') {
                  alert('请先点击“随机生成属性”按钮！');
                  return;
                }

                let message =
                  `
        ### 指挥官身份设定
        - **代号:** ${commanderCodename || '未设定'}
        - **性别:** ${commanderGender}
        - **出身背景:** ${commanderOrigin}
        `.trim() + '\n';

                if (landshipName) {
                  message += `\n### 陆行舰设定\n- **舰船命名:** ${landshipName}\n`;
                }

                message += `
        ### 初始人形设定
        - **性格期望:** ${personality}
        - **作战风格期望:** ${combatStyle}
        - **稀有度:** ${rarity}
        - **人形能力:**
          - 战术执行力: ${stat1}
          - 素体韧性: ${stat2}
          - 心智稳定度: ${stat3}
          - 环境适应性: ${stat4}
          - 成长潜质: ${stat5}

        ### 舰载AI设定
        - **AI风格:** ${aiStyle}
        - **AI名称:** ${aiName}

        `.trim();

                // SillyTavern API integration
                if (
                  typeof triggerSlash !== 'undefined' &&
                  typeof setVariables !== 'undefined' &&
                  typeof getCurrentMessageId !== 'undefined'
                ) {
                  triggerSlash(`/send ${message}`);
                  await new Promise(r => setTimeout(r, 200)); // Give ST a moment

                  const messageId = await getCurrentMessageId();
                  const stat_data = {
                    commander_info: {
                      codename: commanderCodename,
                      gender: commanderGender,
                      origin: commanderOrigin,
                    },
                    doll_setup: {
                      personality_preference: personality,
                      combat_style_preference: combatStyle,
                      rarity: rarity,
                      abilities: {
                        tactical_execution: stat1,
                        frame_tenacity: stat2,
                        mental_stability: stat3,
                        environmental_adaptability: stat4,
                        growth_potential: stat5,
                      },
                    },
                    ship_ai: {
                      style: aiStyle,
                      name: aiName,
                    },
                  };

                  if (landshipName) {
                    stat_data.ship_info = { name: landshipName };
                  }

                  setVariables(messageId, {
                    srb_custom_start: stat_data,
                  });

                  sendButton.textContent = '已发送!';
                  setTimeout(() => {
                    sendButton.textContent = '确认开启SRB指挥官生涯';
                  }, 2000);
                } else {
