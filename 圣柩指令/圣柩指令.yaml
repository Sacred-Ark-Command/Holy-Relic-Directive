              可见: false

      - 名称: 圣柩zod
        id: fee7a4fb-9601-4dbb-9998-1a47b4ea8f70
        启用: true
        类型: 脚本
        内容: |
          import { registerMvuSchema } from 'https://testingcf.jsdelivr.net/gh/StageDog/tavern_resource/dist/util/mvu_zod.js';

          // 定义可复用的 schema
          const 效果Schema = z.record(z.string().describe('效果名'), z.string().prefault('')).prefault({});

          const 装备Schema = z.object({
            等级: z.string().prefault(''),
            类型: z.string().prefault(''),
            效果: 效果Schema,
            描述: z.string().prefault(''),
            位置: z.string().prefault(''),
          }).prefault({ 等级: '', 类型: '', 效果: {}, 描述: '', 位置: '' });

          const 技能Schema = z.object({
            等级: z.string().prefault(''),
            类型: z.string().prefault(''),
            效果: 效果Schema,
            描述: z.string().prefault(''),
          }).prefault({ 等级: '', 类型: '', 效果: {}, 描述: '' });

          const 人形技能Schema = z.object({
            等级: z.string().prefault(''),
            类型: z.string().prefault(''),
            消耗: z.string().prefault(''),
            效果: 效果Schema,
            描述: z.string().prefault(''),
          }).prefault({ 等级: '', 类型: '', 消耗: '', 效果: {}, 描述: '' });

          const 战斗地形Schema = z.object({
            类型: z.string().prefault(''),
            描述: z.string().prefault(''),
            效果: z.record(z.string().describe('效果名'), z.union([z.string(), z.coerce.number(), z.boolean()])).prefault({}),
          }).prefault({ 类型: '', 描述: '', 效果: {} });

          const 战斗单位Schema = z.object({
            名称: z.string().prefault(''),
            阵营: z.string().prefault(''),
            位置: z.string().regex(/^[LCR](?:[1-9]|1[0-2])$/).catch('C1'),
            HP: z.coerce.number().transform(v => Math.max(0, Math.round(v))).prefault(0),
            最大HP: z.coerce.number().transform(v => Math.max(1, Math.round(v))).prefault(1),
            AP: z.coerce.number().transform(v => Math.max(0, Math.round(v))).prefault(0),
            护甲: z.coerce.number().transform(v => Math.max(0, Math.round(v))).prefault(0),
            闪避: z.coerce.number().transform(v => Math.max(0, Math.round(v))).prefault(0),
            命中修正: z.coerce.number().transform(v => Math.round(v)).prefault(0),
            稳定: z.coerce.number().transform(v => Math.max(0, Math.round(v))).prefault(0),
            武器: z.string().prefault(''),
            战术: z.string().prefault(''),
            状态: z.array(z.string()).prefault([]),
          }).transform(unit => ({
            ...unit,
            HP: Math.min(unit.HP, unit.最大HP),
          })).prefault({
            名称: '', 阵营: '', 位置: 'C1', HP: 1, 最大HP: 1, AP: 0, 护甲: 0, 闪避: 0, 命中修正: 0, 稳定: 0, 武器: '', 战术: '', 状态: []
          });

          const 战斗武器Schema = z.object({
            名称: z.string().prefault(''),
            攻击AP: z.coerce.number().transform(v => Math.max(0, Math.round(v))).prefault(50),
            射程: z.coerce.number().transform(v => Math.max(0, Math.round(v))).prefault(1),
            伤害: z.coerce.number().transform(v => Math.max(1, Math.round(v))).prefault(1),
            穿透: z.coerce.number().transform(v => Math.max(0, Math.round(v))).prefault(0),
            连射: z.coerce.number().transform(v => Math.max(1, Math.round(v))).prefault(1),
            命中: z.coerce.number().transform(v => Math.round(v)).prefault(0),
            范围: z.coerce.number().transform(v => Math.max(0, Math.round(v))).prefault(0),
            特性: z.array(z.string()).prefault([]),
          }).prefault({ 名称: '', 攻击AP: 50, 射程: 1, 伤害: 1, 穿透: 0, 连射: 1, 命中: 0, 范围: 0, 特性: [] });

          const 战斗Schema = z.object({
            启用: z.boolean().prefault(false),
            战斗ID: z.string().prefault(''),
            回合: z.coerce.number().transform(v => Math.max(0, Math.round(v))).prefault(0),
            阶段: z.string().prefault(''),
            随机种子: z.coerce.number().transform(v => Math.max(0, Math.round(v))).prefault(0),
            地图: z.object({
              长度: z.coerce.number().transform(v => Math.max(1, Math.round(v))).prefault(12),
              战线: z.array(z.string()).prefault(['L', 'C', 'R']),
              地形: z.record(z.string().describe('位置'), 战斗地形Schema).prefault({}),
            }).prefault({ 长度: 12, 战线: ['L', 'C', 'R'], 地形: {} }),
            单位: z.record(z.string().describe('单位ID'), 战斗单位Schema).prefault({}),
            武器库: z.record(z.string().describe('武器ID'), 战斗武器Schema).prefault({}),
            最近结算: z.object({
              指令: z.record(z.string(), z.any()).prefault({}),
              战报: z.array(z.string()).prefault([]),
              状态摘要: z.string().prefault(''),
            }).prefault({ 指令: {}, 战报: [], 状态摘要: '' }),
          }).prefault({
            启用: false,
            战斗ID: '',
            回合: 0,
            阶段: '',
            随机种子: 0,
            地图: { 长度: 12, 战线: ['L', 'C', 'R'], 地形: {} },
            单位: {},
            武器库: {},
            最近结算: { 指令: {}, 战报: [], 状态摘要: '' },
          });

          // 主 Schema 定义
          export const Schema = z.object({
            时间: z.string().prefault(''),
            地点: z.string().prefault(''),
            天气: z.string().prefault(''),
            纳米尘污染等级: z.string().prefault(''),
            战斗: 战斗Schema,

            任务列表: z.record(z.string().describe('任务名称'), z.object({
              类型: z.string().prefault(''),
              简介: z.string().prefault(''),
              目标: z.string().prefault(''),
              奖励: z.string().prefault(''),
            }).prefault({ 类型: '', 简介: '', 目标: '', 奖励: '' })).prefault({}),

            主角: z.object({
              功绩点: z.coerce.number().transform(v => Math.round(v)).prefault(0),
              功绩排名: z.string().prefault(''),
              最高功绩: z.coerce.number().transform(v => Math.round(v)).prefault(0),
              评级: z.string().prefault(''),
              任务完成数量: z.coerce.number().prefault(0),
              属性: z.object({
                交涉: z.coerce.number().prefault(0),
                指挥: z.coerce.number().prefault(0),
                瞄准: z.coerce.number().prefault(0),
                智力: z.coerce.number().prefault(0),
              }).prefault({ 交涉: 0, 指挥: 0, 瞄准: 0, 智力: 0 }),
              技能: z.record(z.string().describe('技能名称'), 技能Schema).prefault({}),
            }).prefault({
              功绩点: 0,
              功绩排名: '',
              最高功绩: 0,
              评级: '',
              任务完成数量: 0,
              属性: { 交涉: 0, 指挥: 0, 瞄准: 0, 智力: 0 },
              技能: {},
            }),

            剧情进度: z.coerce.number().prefault(0),

            陆行舰: z.object({
              等级数据: z.record(z.string().describe('陆行舰名称'), z.object({
                陆行舰等级: z.string().prefault(''),
                设施最大数量: z.coerce.number().prefault(0),
                设施等级上限: z.coerce.number().prefault(0),
                武器上限: z.coerce.number().prefault(0),
                载具上限: z.coerce.number().prefault(0),
              }).prefault({ 陆行舰等级: '', 设施最大数量: 0, 设施等级上限: 0, 武器上限: 0, 载具上限: 0 })).prefault({}),
              舰内设施: z.record(z.string().describe('设施名称'), z.object({
                等级: z.string().prefault(''),
                效果: 效果Schema,
                描述: z.string().prefault(''),
              }).prefault({ 等级: '', 效果: {}, 描述: '' })).prefault({}),
              舰载武装: z.record(z.string().describe('武装名称'), z.object({
                等级: z.string().prefault(''),
                类型: z.string().prefault(''),
                效果: 效果Schema,
                描述: z.string().prefault(''),
                状态: z.string().prefault(''),
              }).prefault({ 等级: '', 类型: '', 效果: {}, 描述: '', 状态: '' })).prefault({}),
              舰载机库: z.record(z.string().describe('载具名称'), z.object({
                等级: z.string().prefault(''),
