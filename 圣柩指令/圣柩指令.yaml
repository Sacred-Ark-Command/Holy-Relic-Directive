              async function initDisplay() {
                try {
                  const messages = await getChatMessages(getCurrentMessageId());
                  if (!messages || messages.length === 0 || !messages[0].data) {
                    document.getElementById('status-display').innerHTML =
                      "<p style='color:red;padding:10px;'>无法加载状态数据 (messages empty)</p>";
                    return;
                  }
                  const gameData = messages[0].data;
                  const characterData = gameData.display_data || gameData.stat_data;
                  if (!characterData) {
                    document.getElementById('status-display').innerHTML =
                      "<p style='color:red;padding:10px;'>无法加载状态数据 (characterData missing)</p>";
                    return;
                  }

                  // --- Global Info ---
                  const statData = gameData.stat_data;
                  statDataCache = statData; // Cache the data

                  // 清理旧的动态舰船分区，防止升级后刷新时重复创建
                  document.querySelectorAll('.dynamic-ship-section').forEach(el => el.remove());

                  // --- Themeing ---
                  const shipType = SafeGetValue(statData, '陆行舰.陆行舰等级', '拓荒者级');
                  const body = document.body;
                  body.classList.remove('theme-pioneer', 'theme-expedition', 'theme-dominator'); // Clear old themes
                  if (shipType === '远征军级') {
                    body.classList.add('theme-expedition');
                  } else if (shipType === '主宰级') {
                    body.classList.add('theme-dominator');
                  } else {
                    body.classList.add('theme-pioneer');
                  }

                  document.getElementById('global-time').innerText = SafeGetValue(statData, '时间', 'N/A');
                  document.getElementById('global-location').innerText = SafeGetValue(statData, '地点', 'N/A');
                  document.getElementById('global-weather').innerText = SafeGetValue(statData, '天气', 'N/A');
                  document.getElementById('global-pollution').innerText = SafeGetValue(statData, '纳米尘污染等级', 'N/A');
                  const merit = SafeGetValue(statData, '功绩点', '0');
                  const rank = SafeGetValue(statData, '功绩排名', '未排名');
                  document.getElementById('global-merit').innerText = `${merit} / ${rank}`;
                  document.getElementById('global-commander-rank').innerText = SafeGetValue(statData, '指挥官评级', '新晋指挥官');
                  document.getElementById('srb-announcement').innerText = SafeGetValue(statData, 'SRB公告', '无');

                  // --- Missions ---
                  missionCache = []; // Reset cache
                  let missionsObject = GetRawValue(statData, 'SRB委派任务', null);
                  if (missionsObject && Array.isArray(missionsObject)) {
                    missionsObject = missionsObject[0];
                  }

                  if (missionsObject && typeof missionsObject === 'object') {
                    for (const key in missionsObject) {
                      if (!missionsObject.hasOwnProperty(key) || key === '$meta') continue;
                      
                      let singleTaskData = missionsObject[key];
                      if (singleTaskData && Array.isArray(singleTaskData)) {
                        singleTaskData = singleTaskData[0];
                      }

                      if (singleTaskData && typeof singleTaskData === 'object' && SafeGetValue(singleTaskData, '任务名', '').trim() !== '') {
                        missionCache.push(singleTaskData);
                      }
                    }
                  }
                  
                  // Dynamically create filter buttons
                  const filterControls = document.getElementById('mission-filter-controls');
                  const missionTypes = ['all', ...new Set(missionCache.map(m => SafeGetValue(m, '任务类型', '')).filter(t => t))];
                  
                  if (!missionTypes.includes(currentMissionFilter)) {
                      currentMissionFilter = 'all';
                  }

                  filterControls.innerHTML = ''; // Clear existing buttons
                  missionTypes.forEach(type => {
                      const btn = document.createElement('button');
                      btn.className = 'sort-btn';
                      const typeText = { 'all': '全部' };
                      btn.textContent = typeText[type] || type;
                      if (type === currentMissionFilter) {
                          btn.classList.add('active');
                      }
                      btn.onclick = (event) => {
                          event.stopPropagation();
                          currentMissionFilter = type;
                          filterControls.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                          btn.classList.add('active');
                          renderMissions();
                      };
                      filterControls.appendChild(btn);
                  });

                  renderMissions();

                  // --- Ship Log ---
                  const shipLogContainer = document.getElementById('ship-log-content');
                  const shipLogData = GetRawValue(statData, '陆行舰.舰上信息', {});
                  shipLogContainer.innerHTML = ''; // Clear content

                  if (shipLogData && typeof shipLogData === 'object' && !Array.isArray(shipLogData)) {
                    const logTitles = {
                      '人形日常': '人形日常',
                      '最近战报': '最近战报',
                      'AI建议': 'AI建议',
                      '指挥官动向': '指挥官动向'
                    };

                    let isFirst = true;
                    for (const key in logTitles) {
                      if (logTitles.hasOwnProperty(key)) {
                        const value = SafeGetValue(shipLogData, key, '无');
                        const logEntry = document.createElement('div');
                        // Add a border to all but the first entry
                        const headerStyle = isFirst ? 'margin-top: 0; padding-top: 0; border-top: none;' : 'border-top: 1px solid var(--border-color); padding-top: 10px; margin-top: 10px;';
                        
                        logEntry.innerHTML = `
                            <div class="doll-header" onclick="toggleDollDetails(this)" style="${headerStyle}">${logTitles[key]}</div>
                            <div class="doll-content" style="padding: 10px 5px; display: none;">
                                <span class="value-description text-wrap" style="color: var(--text-primary);">${value || '无'}</span>
                            </div>
                        `;
                        shipLogContainer.appendChild(logEntry);
                        isFirst = false;
                      }
                    }
                  } else {
                     // Fallback for old string format or unexpected array
                     const oldValue = Array.isArray(shipLogData) ? SafeGetValue(shipLogData, '0', '一切正常。') : shipLogData;
                     shipLogContainer.innerHTML = `
                        <div class="property" style="grid-template-columns: 1fr; grid-template-areas: 'value'">
                          <div class="property-value-container" style="justify-content: flex-start; grid-area: value; text-align: left">
                            <span class="value-description text-wrap" style="color: var(--text-primary)">${oldValue || '一切正常。'}</span>
                          </div>
                        </div>
                     `;
                  }

                  // --- Ship Info ---
                  const shipName = SafeGetValue(statData, '陆行舰.陆行舰等级', '拓荒者级');
                  document.getElementById('ship-name').innerText = `陆行舰 “${shipName}”`;
                  document.getElementById('ship-type').innerText = shipName;
                  const shipAI = GetRawValue(statData, '陆行舰.舰载AI', {});
                  const aiName = SafeGetValue(shipAI, '名称', '无');
                  const aiStyle = SafeGetValue(shipAI, '风格', '未知风格').split('：')[0]; // 只取“：”之前的部分
                  document.getElementById('ship-ai').innerText = `${aiName} / ${aiStyle}`;
                  document.getElementById('ship-core').innerText = SafeGetValue(statData, '陆行舰.能源核心', 'N/A');

                  // --- Ship Limits ---
                  const shipLevelDataPath = `陆行舰.陆行舰等级数据.${shipName}`;
                  const facilityCap = SafeGetValue(statData, `${shipLevelDataPath}.设施最大数量`, 'N/A');
                  const levelCap = SafeGetValue(statData, `${shipLevelDataPath}.设施等级上限`, 'N/A');
                  document.getElementById('ship-level-cap').innerText = `Lv.${levelCap}`;

                  // --- Ship Facilities (Dynamic) ---
                  const facilitiesContainer = document.getElementById('ship-facilities-list');
                  const facilitiesData = GetRawValue(statData, '陆行舰.舰内设施', {});
                  facilitiesContainer.innerHTML = ''; // Clear previous list

                  const maxFacilities = parseInt(facilityCap, 10);
                  let facilityCount = 0;

                  for (const facilityName in facilitiesData) {
                    if (!facilitiesData.hasOwnProperty(facilityName) || facilityName === '$meta') {
                      continue;
                    }
                    // Stop adding facilities if the cap is reached
                    if (!isNaN(maxFacilities) && facilityCount >= maxFacilities) {
                      break;
                    }
                    const facility = facilitiesData[facilityName];
                    const level = SafeGetValue(facility, '等级', '1');

                    const facilityElement = document.createElement('div');
                    facilityElement.className = 'facility-container';
                    facilityElement.setAttribute('onclick', `toggleFacilityDescription(this, '${facilityName}')`);
                    facilityElement.innerHTML = `
                      <div class="facility-header">
                        <span class="property-name">${facilityName}</span>
                        <span class="value-main">Lv.${level} / ${levelCap}</span>
                      </div>
                      <div class="facility-description"></div>
                    `;
                    facilitiesContainer.appendChild(facilityElement);
                    facilityCount++;
                  }

                  document.getElementById('ship-facility-cap').innerText = `${facilityCount} / ${facilityCap}`;

                  const statusGrid = document.querySelector('.status-grid');
                  // Correctly identify the ship section element to insert before
                  const shipSection = document.getElementById('ship-name-container').parentElement;

                  // --- Landship Armaments & Hangar ---
                  const armamentsData = GetRawValue(statData, '陆行舰.陆行舰载武装', {});
                  const hangarData = GetRawValue(statData, '陆行舰.陆行舰机库', {});
                  const shipLevelData = GetRawValue(statData, `陆行舰.陆行舰等级数据.${shipName}`, {});
                  const armamentCap = GetRawValue(shipLevelData, '武器上限', 'N/A');
                  const hangarCap = GetRawValue(shipLevelData, '载具上限', 'N/A');
                  const armamentsCount = Object.keys(armamentsData).filter(k=>k!=='$meta' && SafeGetValue(armamentsData[k], '名称', '') !== '').length;
                  const hangarCount = Object.keys(hangarData).filter(k=>k!=='$meta' && SafeGetValue(hangarData[k], '名称', '') !== '').length;

                  // Create sections in reverse order of appearance, as insertBefore adds the new element at the beginning.
                  // 1. Create Hangar section first.
                  createExpandableItemSection(
                      `陆行舰机库 (${hangarCount} / ${hangarCap})`,
                      hangarData,
                      '陆行舰.陆行舰机库',
                      statusGrid,
                      shipSection
                  );
                  
                  // 2. Create Armaments section second, so it appears before the Hangar.
                  createExpandableItemSection(
                      `陆行舰载武装 (${armamentsCount} / ${armamentCap})`,
                      armamentsData,
                      '陆行舰.陆行舰载武装',
                      statusGrid,
                      shipSection
                  );

                  // --- Dynamic Ship Sections ---
                  const shipData = GetRawValue(statData, '陆行舰', {});
                  const handledShipKeys = [
                    '陆行舰等级',
                    '能源核心',
                    '舰载AI',
                    '舰内设施',
                    '$meta',
                    '陆行舰等级数据',
                    '舰上信息',
                    '人形武备库', // Will be handled inside '舰内资源'
                    '特殊物品库', // Will be handled inside '舰内资源'
                    '陆行舰载武装', // Handled separately
                    '陆行舰机库', // Handled separately
                  ];

                  for (const shipSectionName in shipData) {
                    if (!shipData.hasOwnProperty(shipSectionName) || handledShipKeys.includes(shipSectionName)) {
                      continue;
                    }

                    const sectionData = shipData[shipSectionName];
                    if (typeof sectionData !== 'object' || sectionData === null) continue;

                    // Create the section container
                    const sectionEl = document.createElement('div');
                    sectionEl.className = 'section dynamic-ship-section'; // 添加用于清理的类
                    if (shipSectionName === '舰内资源') {
                      sectionEl.classList.add('ship-resources-section');
                    }
                    sectionEl.innerHTML = `
                      <div class="section-header clickable" onclick="toggleSection(this)">${shipSectionName}</div>
                      <div class="section-content" style="display: none;"></div>
                    `;
                    const contentEl = sectionEl.querySelector('.section-content');

                    // --- Armory Sub-Section (if this is the resources section) ---
                    if (shipSectionName === '舰内资源') {
                      const armoryData = GetRawValue(statData, '陆行舰.人形武备库', {});
                      if (armoryData && typeof armoryData === 'object' && Object.keys(armoryData).filter(k => k !== '$meta').length > 0) {
                        const armoryContainer = document.createElement('div');
                        armoryContainer.style.marginTop = '15px';
                        armoryContainer.innerHTML = `
                          <div class="section-header clickable" onclick="toggleSection(this)" style="font-size: 1.1em; border-top: 1px solid var(--border-color); padding-top: 10px;">人形武备库</div>
                          <div class="section-content" style="display: none; gap: 10px; padding-left: 10px;"></div>
                        `;
                        const armoryContentEl = armoryContainer.querySelector('.section-content');
                        
                        for (const weaponKey in armoryData) {
                          if (!armoryData.hasOwnProperty(weaponKey) || weaponKey === '$meta') continue;
                          
                          const weapon = armoryData[weaponKey];
                          const weaponName = SafeGetValue(weapon, '名称', '未知武器');
                          const weaponType = SafeGetValue(weapon, '类型', 'N/A');
                          const weaponLevel = SafeGetValue(weapon, '等级', 'N/A');
                          const weaponQty = SafeGetValue(weapon, '数量', 'N/A');

                          const weaponEl = document.createElement('div');
                          weaponEl.className = 'property';
                          weaponEl.style.cursor = 'pointer';
                          const weaponPath = `陆行舰.人形武备库.${weaponKey}`;
                          weaponEl.setAttribute('onclick', `toggleItemDescription(this, '${weaponPath}')`);
                          weaponEl.innerHTML = `
                            <div class="property-name" style="text-transform: none;">${weaponName} <span style="color: var(--accent-highlight); font-size: 0.9em;">(Lv.${weaponLevel})</span></div>
                            <div class="property-value-container">
                              <span class="value-main">x${weaponQty}</span>
                            </div>
                            <div class="item-description"></div>
                          `;
                          armoryContentEl.appendChild(weaponEl);
                        }
                        contentEl.appendChild(armoryContainer);
                      }

                      // --- Special Items Sub-Section (if this is the resources section) ---
                      const specialItemsData = GetRawValue(statData, '陆行舰.特殊物品库', {});
                      if (specialItemsData && typeof specialItemsData === 'object' && Object.keys(specialItemsData).filter(k => k !== '$meta').length > 0) {
                        const specialItemsContainer = document.createElement('div');
                        specialItemsContainer.style.marginTop = '15px';
                        specialItemsContainer.innerHTML = `
                          <div class="section-header clickable" onclick="toggleSection(this)" style="font-size: 1.1em; border-top: 1px solid var(--border-color); padding-top: 10px;">特殊物品库</div>
                          <div class="section-content" style="display: none; gap: 10px; padding-left: 10px;"></div>
                        `;
                        const specialItemsContentEl = specialItemsContainer.querySelector('.section-content');
                        
                        for (const itemKey in specialItemsData) {
                          if (!specialItemsData.hasOwnProperty(itemKey) || itemKey === '$meta' || SafeGetValue(specialItemsData[itemKey], '名称', '') === '') continue;
                          
                          const item = specialItemsData[itemKey];
                          const itemName = SafeGetValue(item, '名称', '未知物品');
                          const itemType = SafeGetValue(item, '类型', 'N/A');
                          const itemQty = SafeGetValue(item, '数量', 'N/A');

                          const itemEl = document.createElement('div');
                          itemEl.className = 'property';
                          itemEl.style.cursor = 'pointer';
                          const itemPath = `陆行舰.特殊物品库.${itemKey}`;
                          itemEl.setAttribute('onclick', `toggleItemDescription(this, '${itemPath}')`);
                          itemEl.innerHTML = `
                            <div class="property-name" style="text-transform: none;">${itemName} <span style="color: var(--accent-highlight); font-size: 0.9em;">(${itemType})</span></div>
                            <div class="property-value-container">
                              <span class="value-main">x${itemQty}</span>
                            </div>
                            <div class="item-description"></div>
                          `;
                          specialItemsContentEl.appendChild(itemEl);
                        }
                        // Only append if there's actual content
                        if (specialItemsContentEl.children.length > 0) {
                            contentEl.appendChild(specialItemsContainer);
                        }
                      }
                    }

                    // Populate the section content
                    for (const propName in sectionData) {
                      if (!sectionData.hasOwnProperty(propName) || propName === '$meta') continue;

                      let propValue = GetRawValue(sectionData, propName);

                      // Check if the value is wrapped in a [value, description] array and extract the actual value
                      if (Array.isArray(propValue) && propValue.length === 2 && typeof propValue[1] === 'string') {
                        propValue = propValue[0];
                      }

                      // Case 1: Value is an array (likely an item list)
                      if (Array.isArray(propValue)) {
                        // Create a sub-header for the item list category
                        const subHeader = document.createElement('div');
                        subHeader.className = 'property-name';
                        subHeader.style.marginBottom = '5px';
                        subHeader.innerText = propName;
                        contentEl.appendChild(subHeader);

                        // List the items
                        propValue.forEach(item => {
                          if (typeof item !== 'object' || item === null) return;
                          const itemName = SafeGetValue(item, '物品名', '未知物品');
                          const itemQty = SafeGetValue(item, '数量', 'N/A');
                          const itemEl = document.createElement('div');
                          itemEl.className = 'property';
                          itemEl.style.paddingLeft = '15px'; // Indent items
                          itemEl.innerHTML = `
                            <div class="property-name" style="text-transform: none;">${itemName}</div>
                            <div class="property-value-container">
                              <span class="value-main">${itemQty}</span>
                            </div>
                          `;
                          contentEl.appendChild(itemEl);
                        });
                      }
                      // Case 2: Simple key-value pair
                      else {
                        const propEl = document.createElement('div');
                        propEl.className = 'property';
                        propEl.innerHTML = `
                          <div class="property-name">${propName}</div>
                          <div class="property-value-container">
                            <span class="value-main">${propValue}</span>
                          </div>
                        `;
                        contentEl.appendChild(propEl);
                      }
                    }
                    statusGrid.appendChild(sectionEl);
                  }

                  // --- Doll Info ---
                  const dollList = GetRawValue(statData, '人形列表.圣柩人形', []);
                  renderDollList(dollList);


                } catch (error) {
                  document.getElementById(
                    'status-display',
                  ).innerHTML = `<p style='color:red;padding:10px;'>状态栏加载出错: ${error.message}</p>`;
                  console.error(error);
                }
              }

              function toggleSection(headerElement) {
                // Stop propagation if a sort button was clicked
                if (event.target.classList.contains('sort-btn')) {
                    event.stopPropagation();
                    return;
                }
                const content = headerElement.nextElementSibling;
                if (content) {
                  const isVisible = content.style.display === 'flex' || content.style.display === 'block';
                  content.style.display = isVisible ? 'none' : 'flex';
                }
              }

              // --- Confirmation Modal Logic ---
              function showConfirmationModal(title, text, onConfirmCallback) {
                const modal = document.getElementById('confirmation-modal');
                if (!modal) return;

                document.getElementById('confirmation-modal-title').innerText = title;
                document.getElementById('confirmation-modal-text').innerText = text;

                const confirmBtn = document.getElementById('confirmation-modal-confirm-btn');
                
                // Clone and replace the button to remove old event listeners
                const newConfirmBtn = confirmBtn.cloneNode(true);
                confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);

                newConfirmBtn.onclick = () => {
                  onConfirmCallback();
                  closeConfirmationModal();
                };

                modal.style.display = 'block';
              }

              function closeConfirmationModal() {
                const modal = document.getElementById('confirmation-modal');
                if (modal) {
                  modal.style.display = 'none';
                }
              }

              function openInteractionModal() {
                const modal = document.getElementById('interaction-modal');
                if (!modal || !statDataCache) return;

                const dollListContainer = document.getElementById('interaction-doll-list');
                dollListContainer.innerHTML = ''; // Clear previous list

                const dollList = GetRawValue(statDataCache, '人形列表.圣柩人形', []);
                let hasDolls = false;
                if (Array.isArray(dollList) && dollList.length > 0) {
                    dollList.forEach(dollData => {
                        if (typeof dollData !== 'object' || dollData === null) return;
                        const dollName = SafeGetValue(dollData, '代号', null);
                        if (!dollName) return;
                        hasDolls = true;

                        const dollItem = document.createElement('div');
                        dollItem.className = 'interaction-doll-item';
                        dollItem.textContent = dollName;
                        dollItem.dataset.dollName = dollName;
                        dollListContainer.appendChild(dollItem);
                    });
                } 
                
                if (!hasDolls) {
                    dollListContainer.innerHTML = '<p>无可用人形。</p>';
                }
                
                modal.style.display = 'block';
              }

              function closeInteractionModal() {
                const modal = document.getElementById('interaction-modal');
                if (modal) {
                    modal.style.display = 'none';
                }
              }

              function openArmamentsModal() {
                const modal = document.getElementById('armaments-modal');
                if (!modal || !statDataCache) return;

                const listContainer = document.getElementById('armaments-list');
                listContainer.innerHTML = ''; // Clear previous list

                const items = GetRawValue(statDataCache, '陆行舰.陆行舰载武装', {});
                let hasItems = false;
                for (const key in items) {
                    if (!items.hasOwnProperty(key) || key === '$meta') continue;
                    
                    const item = items[key];
                    const itemName = SafeGetValue(item, '名称', null);
                    if (!itemName || itemName.trim() === '') continue;
                    
                    hasItems = true;
                    const itemButton = document.createElement('button');
                    itemButton.className = 'action-button';
                    itemButton.textContent = itemName;
                    itemButton.dataset.itemName = itemName;
                    listContainer.appendChild(itemButton);
                }
                
                if (!hasItems) {
                    listContainer.innerHTML = '<p>无可用武装。</p>';
                }
                
                modal.style.display = 'block';
              }

              function closeArmamentsModal() {
                const modal = document.getElementById('armaments-modal');
                if (modal) modal.style.display = 'none';
              }

              function openHangarModal() {
                const modal = document.getElementById('hangar-modal');
                if (!modal || !statDataCache) return;

                const listContainer = document.getElementById('hangar-list');
                listContainer.innerHTML = ''; // Clear previous list

                const items = GetRawValue(statDataCache, '陆行舰.陆行舰机库', {});
                let hasItems = false;
                for (const key in items) {
                    if (!items.hasOwnProperty(key) || key === '$meta') continue;
                    
                    const item = items[key];
                    const itemName = SafeGetValue(item, '名称', null);
                    if (!itemName || itemName.trim() === '') continue;
                    
                    hasItems = true;
                    const itemButton = document.createElement('button');
                    itemButton.className = 'action-button';
                    itemButton.textContent = itemName;
                    itemButton.dataset.itemName = itemName;
                    listContainer.appendChild(itemButton);
                }
                
                if (!hasItems) {
                    listContainer.innerHTML = '<p>无可用载具。</p>';
                }
                
                modal.style.display = 'block';
              }

              function closeHangarModal() {
                const modal = document.getElementById('hangar-modal');
                if (modal) modal.style.display = 'none';
              }

              document.addEventListener('DOMContentLoaded', () => {
                initDisplay();

                // --- Modal Listeners Setup ---

                // Upgrade Modal
                const upgradeModal = document.getElementById('upgrade-modal');
                const openUpgradeBtn = document.getElementById('upgrade-facility-btn');
                const closeUpgradeBtn = document.getElementById('upgrade-modal-close-btn');
                if(openUpgradeBtn) openUpgradeBtn.addEventListener('click', openUpgradeModal);
                if(closeUpgradeBtn) closeUpgradeBtn.addEventListener('click', closeUpgradeModal);
                
                // AI Query Modal
                const aiQueryModal = document.getElementById('ai-query-modal');
                const openAiQueryBtn = document.getElementById('ask-ai-btn');
                const closeAiQueryBtn = document.getElementById('ai-query-modal-close-btn');
                if (openAiQueryBtn) openAiQueryBtn.addEventListener('click', openAiQueryModal);
                if (closeAiQueryBtn) closeAiQueryBtn.addEventListener('click', closeAiQueryModal);

                // Confirmation Modal
                const confirmationModal = document.getElementById('confirmation-modal');
                const closeConfirmationBtn = document.getElementById('confirmation-modal-close-btn');
                const cancelConfirmationBtn = document.getElementById('confirmation-modal-cancel-btn');
                if(closeConfirmationBtn) closeConfirmationBtn.addEventListener('click', closeConfirmationModal);
                if(cancelConfirmationBtn) cancelConfirmationBtn.addEventListener('click', closeConfirmationModal);

                // Generic click outside to close modals
                window.addEventListener('click', (event) => {
                    if (event.target == upgradeModal) closeUpgradeModal();
                    if (event.target == aiQueryModal) closeAiQueryModal();
                    if (event.target == confirmationModal) closeConfirmationModal();
                    if (event.target == document.getElementById('interaction-modal')) closeInteractionModal();
                    if (event.target == document.getElementById('armaments-modal')) closeArmamentsModal();
                    if (event.target == document.getElementById('hangar-modal')) closeHangarModal();
                });

                // Interaction Modal
                const openInteractionBtn = document.getElementById('interact-doll-btn');
                const closeInteractionBtn = document.getElementById('interaction-modal-close-btn');
                if (openInteractionBtn) openInteractionBtn.addEventListener('click', openInteractionModal);
                if (closeInteractionBtn) closeInteractionBtn.addEventListener('click', closeInteractionModal);

                // Doll selection in interaction modal
                const interactionDollList = document.getElementById('interaction-doll-list');
                if (interactionDollList) {
                    interactionDollList.addEventListener('click', (event) => {
                        if (event.target.matches('.interaction-doll-item')) {
                            event.target.classList.toggle('selected');
                        }
                    });
                }

                // Interaction action buttons
                const interactionActionsContainer = document.getElementById('interaction-actions');
                if (interactionActionsContainer) {
                    interactionActionsContainer.addEventListener('click', (event) => {
                        if (event.target.matches('.action-button')) {
                            const selectedDolls = Array.from(document.querySelectorAll('.interaction-doll-item.selected'))
                                                       .map(item => item.dataset.dollName);
                            
                            if (selectedDolls.length === 0) {
                                alert('请至少选择一个人形。');
                                return;
                            }

                            const action = event.target.dataset.action;
                            const dollNames = selectedDolls.join('、');
                            const narrative = `对${dollNames}${action}`;
                            const commandToSend = `/send ${narrative}|/trigger`;

                            if (typeof triggerSlash === 'function') {
                                triggerSlash(commandToSend);
                                closeInteractionModal();
                            } else {
                                console.error('triggerSlash function is not available.');
                                alert('无法执行操作。');
                            }
                        }
                    });
                }

                // --- Action Button Listeners ---

                const mspButton = document.getElementById('msp-supply-btn');
                if (mspButton) {
                  mspButton.addEventListener('click', () => {
                    showConfirmationModal(
                      '获取供应协议',
                      '是否使用MSP供应协议获取新的供应?',
                      () => {
                        const commandToSend = '/send 打开MSP供应协议|/trigger';
                        if (typeof triggerSlash === 'function') {
                          triggerSlash(commandToSend);
                        } else {
                          console.error('triggerSlash function is not available.');
                        }
                      }
                    );
                  });
                }

                const requestDollButton = document.getElementById('request-doll-btn');
                if (requestDollButton) {
                  requestDollButton.addEventListener('click', () => {
                    showConfirmationModal(
                      '人形调用申请',
                      '是否使用人形调用申请获取新的人形?',
                      () => {
                        const commandToSend = '/send 使用申请单获取随机人形|/trigger';
                        if (typeof triggerSlash === 'function') {
                          triggerSlash(commandToSend);
                        } else {
                          console.error('triggerSlash function is not available.');
                        }
                      }
                    );
                  });
                }

                // --- Armaments Modal Listeners ---
                const openArmamentsBtn = document.getElementById('armaments-btn');
                const closeArmamentsBtn = document.getElementById('armaments-modal-close-btn');
                const armamentsList = document.getElementById('armaments-list');
                const armamentsConfirmBtn = document.getElementById('armaments-confirm-btn');

                if (openArmamentsBtn) openArmamentsBtn.addEventListener('click', openArmamentsModal);
                if (closeArmamentsBtn) closeArmamentsBtn.addEventListener('click', closeArmamentsModal);
                
                if (armamentsList) {
                    armamentsList.addEventListener('click', (event) => {
                        if (event.target.matches('.action-button')) {
                            armamentsList.querySelectorAll('.action-button').forEach(btn => btn.classList.remove('selected'));
                            event.target.classList.add('selected');
                        }
                    });
                }

                if (armamentsConfirmBtn) {
                    armamentsConfirmBtn.addEventListener('click', () => {
                        const selectedWeapon = armamentsList.querySelector('.action-button.selected');
                        if (!selectedWeapon) {
                            alert('请选择一个武装。');
                            return;
                        }
                        const weaponName = selectedWeapon.dataset.itemName;
                        const narrative = `使用舰载武装【${weaponName}】`;
                        const commandToSend = `/send ${narrative}|/trigger`;
                        if (typeof triggerSlash === 'function') {
                            triggerSlash(commandToSend);
                            closeArmamentsModal();
                        } else {
                            console.error('triggerSlash function is not available.');
